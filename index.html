const HANG_MARKS   = ['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫','⑬','⑭','⑮'];

// A2: 전체 사전 단어 평탄화 (팝업 내 용어 크로스링크용)
const DICT_FLAT=[];
for(const[aid,entries]of Object.entries(DICT)){
  entries.forEach((e,idx)=>{DICT_FLAT.push({word:e.word,aid,idx});});
}
DICT_FLAT.sort((a,b)=>b.word.length-a.word.length);

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function linkifyRefs(text) {
  return esc(text).replace(
    /제(\d+)조(?:\s*제(\d+)항)?/g,
    (m, art) => {
      const target='art-'+art;
      return '<span class="art-ref" onclick="closePopup();jumpTo(\''+target+'\')">'+m+'</span>';
    }
  );
}
function jumpTo(id) {
  const el=document.getElementById(id);
  if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
}

// A2: 판례 팝업 텍스트에 사전 용어 크로스링크
function enrichPopupText(rawText) {
  let h=linkifyRefs(rawText);
  const parts=h.split(/(<[^>]+>)/);
  const used=new Set();
  return parts.map(p=>{
    if(p.startsWith('<'))return p;
    let t=p;
    for(const d of DICT_FLAT){
      if(used.has(d.word))continue;
      const pos=t.indexOf(d.word);
      if(pos!==-1){
        used.add(d.word);
        t=t.slice(0,pos)
          +'<span class="dict-ref" onclick="event.stopPropagation();showDict(\''+d.aid+'\','+d.idx+')">'+d.word+'</span>'
          +t.slice(pos+d.word.length);
      }
    }
    return t;
  }).join('');
}

// 항(①②③) 단위 분할
function splitByHang(text) {
  const pos = [];
  for (let i=0;i<text.length;i++) {
    const idx = HANG_MARKS.indexOf(text[i]);
    if (idx !== -1) pos.push({p:i, n:idx+1});
  }
  if (!pos.length) return [{n:0,t:text}];
  const segs = [];
  if (pos[0].p > 0) segs.push({n:0,t:text.slice(0,pos[0].p)});
  for (let i=0;i<pos.length;i++) {
    const end = i+1<pos.length ? pos[i+1].p : text.length;
    segs.push({n:pos[i].n, t:text.slice(pos[i].p,end)});
  }
  return segs;
}

// 세그먼트 하이라이트
function highlightSeg(aid, seg) {
  const ranges = [];
  (DICT[aid]||[]).forEach((e,i) => {
    if(e.anchor===null) return;
    const needle=e.anchor||e.word;
    let p=0;
    while(p<seg.length) {
      const f=seg.indexOf(needle,p); if(f===-1)break;
      ranges.push({s:f,e:f+needle.length,type:'dict',i});
      p=f+1;
    }
  });
  (DELEGATIONS[aid]||[]).forEach((e,i) => {
    const anchors=e.subs||[e.phrase];
    for(const anc of anchors) {
      const pi=seg.indexOf(anc); if(pi===-1)continue;
      const pe=pi+anc.length;
      let p=pi;
      while(p<pe) {
        const li=seg.indexOf('법률',p); if(li===-1||li>=pe)break;
        ranges.push({s:li,e:li+2,type:'deleg',i});
        p=li+1;
      }
    }
  });
  ranges.sort((a,b)=>a.s!==b.s?a.s-b.s:(b.e-b.s)-(a.e-a.s));
  const fil=[]; let last=0;
  for(const r of ranges) {
    if(r.s>=last){fil.push(r);last=r.e;}
  }
  let html='',p=0;
  for(const r of fil) {
    html+=esc(seg.slice(p,r.s));
    const t=esc(seg.slice(r.s,r.e));
    if(r.type==='dict')
      html+=`<span class="dict-term" onclick="showDict('${esc(aid)}',${r.i})">${t}</span>`;
    else
      html+=`<span class="deleg-term" onclick="showDeleg('${esc(aid)}',${r.i})">${t}</span>`;
    p=r.e;
  }
  html+=esc(seg.slice(p));
  return html;
}

function makeBadges(aid,hangKey) {
  const entries=((CASES[aid]||{})[hangKey])||[];
  if(!entries.length)return'';
  const hasCase=entries.some(c=>c.type==='판례');
  const hasBochu=entries.some(c=>c.type==='보충');
  let h='';
  if(hasCase)
    h+=`<span class="case-badge" onclick="showCase('${esc(aid)}','${hangKey}')">판례</span>`;
  if(hasBochu)
    h+=`<span class="case-badge bochu-badge" onclick="showCase('${esc(aid)}','${hangKey}')">보충</span>`;
  return h;
}

function renderBody(aid,rawText) {
  const segs=splitByHang(rawText);
  let html='';
  for(const seg of segs) {
    if(seg.n>=2) html+='<br>';
    html+=highlightSeg(aid,seg.t);
    if(seg.n>0) html+=makeBadges(aid,String(seg.n));
  }
  html+=makeBadges(aid,'전체');
  return html;
}

// ── 렌더링 ──────────────────────────────────────────────────────
function render() {
  const main=document.getElementById('main');
  const toc=document.getElementById('toc');
  let mainHtml='', tocHtml='', chIdx=0;

  let hierInserted=false;
  for(const item of CONSTITUTION) {
    if(item.type==='chapter') {
      const cid=`chapter-${chIdx++}`;
      mainHtml+=`<div class="chapter-header" id="${cid}"><span>${esc(item.text)}</span></div>`;
      tocHtml+=`<a class="toc-link" href="#${cid}" onclick="closeSidebar()">${esc(item.text)}</a>`;
    } else if(item.type==='article') {
      const isPre=item.id==='전문';
      if(isPre && !hierInserted) {
        hierInserted=true;
        mainHtml+=`
        <div class="hier-card" id="hier-card">
          <div class="hier-title" onclick="toggleHier()">
            <span>법령 체계도</span>
            <span class="pre-chev" id="hier-chev">▶</span>
          </div>
          <div class="hier-body" id="hier-body">
            <div class="hier-tabs">
              <button class="hier-tab active" data-tab="h" onclick="setHierTab('h')">법령 위계</button>
              <button class="hier-tab" data-tab="c" onclick="setHierTab('c')">핵심 개념어</button>
            </div>
            <div id="hier-content"></div>
          </div>
        </div>`;
      }
      const artId=`art-${item.id}`;
      const clz=isPre?'article-card preamble-card':'article-card';
      const dictWords=(DICT[item.id]||[]).map(e=>e.word).join(' ');
      const searchData=(item.title+' '+(item.section||'')+' '+item.text+' '+dictWords).toLowerCase();

      if(isPre) {
        mainHtml+=`
        <div class="${clz}" id="${artId}" data-search="${esc(searchData)}">
          <div class="article-title pre-toggle" onclick="togglePre()">
            <span class="article-title-num">${esc(item.title)}</span>
            <span class="pre-chev" id="pre-chev">▶</span>
          </div>
          <div class="article-body pre-body" id="pre-body">
            ${renderBody(item.id,item.text)}
          </div>
        </div>`;
      } else {
        const sectHtml=item.section
          ? `<span class="article-title-sect">${esc(item.section)}</span>`
          : '';
        mainHtml+=`
        <div class="${clz}" id="${artId}" data-search="${esc(searchData)}">
          <div class="article-title">
            <span class="article-title-num">${esc(item.title)}</span>
            ${sectHtml}
          </div>
          <div class="article-body">${renderBody(item.id,item.text)}</div>
        </div>`;
      }
    }
  }

  const hasPre=CONSTITUTION.some(i=>i.id==='전문');
  toc.innerHTML=`<div class="toc-label">목차</div>`
    +(hasPre?`<a class="toc-link" href="#art-전문" onclick="closeSidebar()">전문</a>`:'')
    +tocHtml;

  document.getElementById('no-results').insertAdjacentHTML('beforebegin',mainHtml);

  // 스크롤 TOC 활성
  const links=toc.querySelectorAll('.toc-link');
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting) {
        const id=e.target.id;
        links.forEach(l=>l.classList.toggle('active',l.getAttribute('href')==='#'+id));
      }
    });
  },{rootMargin:'-10% 0px -80% 0px'});
  document.querySelectorAll('.chapter-header').forEach(c=>obs.observe(c));
}

// ── 검색 ────────────────────────────────────────────────────────
let _st=null;
function doSearch(q){ clearTimeout(_st); _st=setTimeout(()=>applySearch(q.trim()),120); }
function clearSearchHL() {
  document.querySelectorAll('.article-body mark.search-hi').forEach(m=>{
    m.replaceWith(document.createTextNode(m.textContent));
  });
  document.querySelectorAll('.article-body').forEach(b=>b.normalize());
}
function applySearchHL(q) {
  clearSearchHL();
  if(!q) return;
  document.querySelectorAll('.article-card:not([style*="none"]) .article-body').forEach(body=>{
    hlNodes(body, q);
  });
}
function hlNodes(node, q) {
  if(node.nodeType===3) {
    const idx=node.textContent.toLowerCase().indexOf(q.toLowerCase());
    if(idx===-1) return;
    const mark=document.createElement('mark');
    mark.className='search-hi';
    mark.textContent=node.textContent.slice(idx,idx+q.length);
    const after=node.splitText(idx);
    after.textContent=after.textContent.slice(q.length);
    node.parentNode.insertBefore(mark,after);
  } else if(node.nodeType===1 && !['SCRIPT','STYLE'].includes(node.tagName)) {
    [...node.childNodes].forEach(child=>hlNodes(child,q));
  }
}
function applySearch(q) {
  clearSearchHL();
  const cards=document.querySelectorAll('.article-card');
  const chs=document.querySelectorAll('.chapter-header');
  const cnt=document.getElementById('search-count');
  const noR=document.getElementById('no-results');
  if(!q) {
    cards.forEach(c=>c.style.display='');
    chs.forEach(c=>c.style.display='');
    cnt.classList.remove('visible'); noR.classList.remove('visible'); return;
  }
  const ql=q.toLowerCase();
  let vis=0;
  cards.forEach(c=>{
    const m=c.dataset.search.includes(ql);
    c.style.display=m?'':'none';
    if(m)vis++;
  });
  chs.forEach(ch=>{
    let el=ch.nextElementSibling, show=false;
    while(el&&!el.classList.contains('chapter-header')) {
      if(el.classList.contains('article-card')&&el.style.display!=='none'){show=true;break;}
      el=el.nextElementSibling;
    }
    ch.style.display=show?'':'none';
  });
  cnt.textContent=`${vis}개 조문`; cnt.classList.toggle('visible',vis>0);
  noR.classList.toggle('visible',vis===0);
  applySearchHL(q);
  const first=document.querySelector('.article-card:not([style*="none"])');
  if(first) first.scrollIntoView({behavior:'smooth',block:'start'});
}

// ── 팝업 ────────────────────────────────────────────────────────
function openPopup(type,title,body,fl,fr) {
  document.getElementById('popup-type').textContent=type;
  document.getElementById('popup-title').textContent=title;
  document.getElementById('popup-body').innerHTML=body;
  document.getElementById('popup-footer-l').textContent=fl||'';
  document.getElementById('popup-footer-r').textContent=fr||'';
  document.getElementById('popup-overlay').classList.add('active');
  document.getElementById('popup').classList.add('active');
  document.getElementById('popup-body').scrollTop=0;
}
function closePopup() {
  document.getElementById('popup-overlay').classList.remove('active');
  document.getElementById('popup').classList.remove('active');
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePopup();});

function showDict(aid,idx) {
  const e=DICT[aid][idx];
  const fl=aid==='전문'?'전문':`제${aid}조`;
  openPopup('헌법과 민주시민- 최기훈',e.word,`<p>${esc(e.desc)}</p>`,fl,'');
}
function showDeleg(aid,idx) {
  const e=DELEGATIONS[aid][idx];
  openPopup('위임 법령','법률 위임 조항',
    `<div class="deleg-phrase">${esc(e.phrase)}</div>
     <div class="deleg-label">수임 법령</div>
     <div class="deleg-target">${esc(e.target)}</div>`,
    aid==='전문'?'전문':`제${aid}조`,'');
}
function showCase(aid,hangKey) {
  const entries=((CASES[aid]||{})[hangKey])||[];
  const hasCase=entries.some(c=>c.type==='판례');
  const title=hangKey==='전체'
    ?(hasCase?'관련 판례':'보충 설명')
    :`제${hangKey}항 ${hasCase?'판례':'보충'}`;
  const body=entries.map(e=>`
    <div class="case-entry">
      <span class="case-type-tag ${e.type}-tag">${e.type==='판례'?'판 례':'보 충'}</span>
      <p>${enrichPopupText(e.text)}</p>
    </div>`).join('');
  const cfl=aid==='전문'?'전문':`제${aid}조`;
  openPopup(hasCase?'헌법과 민주시민- 최기훈':'설명',title,body,cfl,`${entries.length}건`);
}

// ── 법령 체계도 데이터 ──────────────────────────────────

const HIER_CONCEPTS = {
  '법령':'법률·대통령령·총리령·부령을 통칭하는 실무 용어. 국가 단위의 성문 규범 전체를 가리킬 때 사용한다.',

  '행정규칙':'고시·훈령·예규·지침 등 행정 내부 기준. 원칙적으로 국민 구속력 없음. 단, 법률의 위임을 받은 고시는 법규명령 효력을 가진다는 것이 판례.',

  '집행명령':'법률의 위임 없이 집행에 필요한 절차·형식만 규정하는 명령. 새로운 권리·의무를 창설할 수 없다.'
};
const HIER_ROWS = [
  {label:'헌법', items:['헌법']},
  {label:'법률', items:['법률']},
  {label:'대통령령', items:['대통령령','시행령'], note:'같은 것'},
  {label:'총리령·부령', items:['총리령','부령','시행규칙'], note:'같은 것'},
  {label:'자치법규', items:['조례','규칙']}
];
let hierSel=null, hierTab='h';

function renderHier() {
  const el=document.getElementById('hier-content');
  if(hierTab==='h') {
    let h='<div>';
    HIER_ROWS.forEach((row,ri)=>{
      h+='<div class="hier-row">';
      h+=`<div class="hier-label">${row.label}</div>`;
      h+='<div class="hier-items">';
      row.items.forEach(item=>{
        const t=HIER_TERMS[item];
        const act=hierSel===item;
        h+=`<button class="hier-btn${act?' active':''}" style="border-color:${t.color};color:${act?'#fff':t.color};${act?'background:'+t.color:''}" onclick="selHier('${item}')">${item}</button>`;
      });
      if(row.note) h+=`<span class="hier-note">← ${row.note}</span>`;
      h+='</div>';
      if(ri<HIER_ROWS.length-1) h+='<div class="hier-conn"></div>';
      h+='</div>';
    });
    if(hierSel && HIER_TERMS[hierSel]) {
      const t=HIER_TERMS[hierSel];
      h+=`<div class="hier-desc" style="border-left-color:${t.color}">`;
      h+=`<div class="hier-desc-title"><span class="hier-desc-name" style="color:${t.color}">${hierSel}</span>`;
      h+=`<span class="hier-desc-maker">제정 주체: ${t.maker}</span></div>`;
      h+=`<div class="hier-desc-text">${esc(t.desc)}</div></div>`;
    } else if(!hierSel) {
      h+='<div class="hier-hint">항목을 클릭하면 정의를 확인할 수 있습니다</div>';
    }
    h+='</div>';
    el.innerHTML=h;
  } else {
    let h='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">';
    Object.keys(HIER_CONCEPTS).forEach(c=>{
      const act=hierSel===c;
      h+=`<button class="cpill${act?' active':''}" onclick="selHier('${c}')">${c}</button>`;
    });
    h+='</div>';
    if(hierSel && HIER_CONCEPTS[hierSel]) {
      h+=`<div class="hier-desc"><div class="hier-desc-title"><span class="hier-desc-name">${hierSel}</span></div>`;
      h+=`<div class="hier-desc-text">${esc(HIER_CONCEPTS[hierSel])}</div></div>`;
    } else {
      h+='<div class="hier-hint">개념어를 클릭하면 설명을 확인할 수 있습니다</div>';
    }
    el.innerHTML=h;
  }
}
function selHier(name) {
  hierSel=hierSel===name?null:name;
  renderHier();
}
function setHierTab(t) {
  hierTab=t; hierSel=null;
  document.querySelectorAll('.hier-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  renderHier();
}
function toggleHier() {
  const body=document.getElementById('hier-body');
  const chev=document.getElementById('hier-chev');
  const isOpen=body.classList.toggle('open');
  chev.classList.toggle('open', isOpen);
  if(isOpen && !body.dataset.init) { body.dataset.init='1'; renderHier(); }
}

render();
