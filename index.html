<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대한민국헌법 — 법정학교수 최기훈</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #F9F7F7;
  --card:    #FFFFFF;
  --light:   #DBE2EF;
  --blue:    #3F72AF;
  --navy:    #112D4E;
  --text:    #1A1A2E;
  --muted:   #6B7A8D;
  --border:  #D6DCE8;
  --sidebar-w: 220px;
  --header-h:  60px;
  --body-text: #2A2A3A;
  --popup-text: #333;
  --deleg-text: #555;
  --deleg-border: #A0A8B8;
  --tag-bg:    #EAECF0;
  --panel-bg:  #F5F7FA;
  --entry-border: #EEE;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body {
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100vh; overflow-x:hidden;
}

/* ── HEADER ──────────────────────────── */
#site-header {
  position:fixed; top:0; left:0; right:0; z-index:300;
  height:var(--header-h);
  background:var(--navy);
  display:flex; align-items:center;
  padding:0 20px; gap:16px;
  box-shadow:0 2px 16px rgba(17,45,78,.4);
  border-bottom:2px solid var(--blue);
}
#menu-btn {
  display:none; background:none; border:none; cursor:pointer;
  color:var(--light); font-size:1.3rem; padding:8px;
  border-radius:6px; transition:background .15s; flex-shrink:0;
  min-width:44px; min-height:44px;
  align-items:center; justify-content:center;
}
#menu-btn:hover { background:rgba(219,226,239,.15); }
#header-title { flex-shrink:0; }
#header-title h1 {
  font-family:'Noto Serif KR',serif;
  font-size:.95rem; font-weight:700;
  color:var(--light); letter-spacing:.06em; white-space:nowrap;
}
#header-title .subtitle {
  font-size:.65rem; color:rgba(219,226,239,.65);
  letter-spacing:.05em; white-space:nowrap;
}

/* ── 검색 ───────────────────────────── */
#search-wrap {
  flex:1; position:relative; max-width:400px;
}
#search {
  width:100%; padding:8px 36px 8px 14px;
  border-radius:20px;
  border:1.5px solid rgba(219,226,239,.3);
  background:rgba(219,226,239,.12);
  color:#fff; font-size:.82rem;
  font-family:'Noto Sans KR',sans-serif;
  outline:none; transition:border-color .2s,background .2s;
}
#search::placeholder { color:rgba(219,226,239,.5); }
#search:focus {
  border-color:var(--light); background:rgba(219,226,239,.2);
}
#search-icon {
  position:absolute; right:12px; top:50%;
  transform:translateY(-50%);
  color:rgba(219,226,239,.5); font-size:.85rem; pointer-events:none;
}
#search-count {
  position:absolute; right:-8px; top:50%;
  transform:translateY(-50%) translateX(100%);
  font-size:.68rem; color:var(--light); white-space:nowrap;
  opacity:0; transition:opacity .2s; padding-left:10px;
}
#search-count.visible { opacity:1; }

/* ── 범례 ───────────────────────────── */
.legend {
  display:flex; gap:12px; align-items:center; flex-shrink:0;
}
.legend-item {
  display:flex; align-items:center; gap:5px;
  font-size:.65rem; color:rgba(219,226,239,.75);
  letter-spacing:.04em; white-space:nowrap;
}
.legend-dot { width:9px; height:9px; border-radius:2px; }
.ld-dict  { background:var(--blue); }
.ld-deleg { background:var(--light); opacity:.8; }
.ld-case  { background:var(--navy); border:1px solid var(--blue); }

/* ── LAYOUT ─────────────────────────── */
#layout {
  display:flex;
  margin-top:var(--header-h);
  min-height:calc(100vh - var(--header-h));
}

/* ── SIDEBAR ────────────────────────── */
#toc {
  width:var(--sidebar-w); min-width:var(--sidebar-w);
  background:var(--navy);
  position:fixed; top:var(--header-h); bottom:0; left:0;
  overflow-y:auto;
  padding:16px 0 40px;
  border-right:1px solid rgba(63,114,175,.3);
  scrollbar-width:thin;
  scrollbar-color:var(--blue) var(--navy);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  z-index:200;
}
#toc::-webkit-scrollbar { width:4px; }
#toc::-webkit-scrollbar-thumb { background:var(--blue); border-radius:2px; }
.toc-label {
  font-size:.63rem; font-weight:700; letter-spacing:.12em;
  color:rgba(219,226,239,.45); text-transform:uppercase;
  padding:16px 16px 6px;
}
.toc-link {
  display:flex; align-items:center;
  font-size:.78rem; color:rgba(219,226,239,.75);
  padding:9px 16px; text-decoration:none;
  border-left:3px solid transparent;
  transition:all .15s; cursor:pointer;
  min-height:44px; line-height:1.35;
}
.toc-link:hover {
  color:#fff; background:rgba(63,114,175,.2);
  border-left-color:var(--blue);
}
.toc-link.active {
  color:var(--light); font-weight:600;
  background:rgba(63,114,175,.18);
  border-left-color:var(--light);
}

/* ── MOB OVERLAY ────────────────────── */
#mob-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(17,45,78,.5); z-index:150;
  backdrop-filter:blur(1px);
}
#mob-overlay.active { display:block; }

/* ── MAIN ───────────────────────────── */
#main {
  margin-left:var(--sidebar-w);
  flex:1; min-width:0;
  padding:28px 36px 80px;
}
#no-results {
  display:none; text-align:center;
  padding:60px 20px; color:var(--muted); font-size:.95rem;
}
#no-results.visible { display:block; }

/* ── CHAPTER HEADER ─────────────────── */
.chapter-header {
  margin:36px 0 14px;
  padding:10px 18px;
  background:var(--navy);
  border-radius:6px;
  border-left:4px solid var(--blue);
}
.chapter-header:first-child { margin-top:0; }
.chapter-header span {
  font-family:'Noto Serif KR',serif;
  font-size:.9rem; font-weight:700;
  color:var(--light); letter-spacing:.05em;
}

/* ── ARTICLE CARD ───────────────────── */
.article-card {
  background:var(--card);
  border-radius:8px; margin-bottom:10px;
  box-shadow:0 1px 3px rgba(17,45,78,.07);
  border-left:4px solid var(--blue);
  overflow:hidden; transition:box-shadow .2s;
}
.article-card:hover {
  box-shadow:0 3px 12px rgba(63,114,175,.14);
}

/* 조문 헤더: 좌=조문번호, 우=절/관명 */
.article-title {
  background:var(--light);
  padding:6px 14px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--border);
  gap:8px;
}
.article-title-num {
  font-family:'Noto Serif KR',serif;
  font-size:.82rem; font-weight:700;
  color:var(--navy); letter-spacing:.06em;
  white-space:nowrap; flex-shrink:0;
}
.article-title-sect {
  font-size:.68rem; font-weight:500;
  color:var(--blue); letter-spacing:.04em;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  opacity:.85;
}
.preamble-card .article-title {
  background:var(--navy);
  border-bottom:1px solid rgba(63,114,175,.3);
}
.preamble-card .article-title-num {
  color:var(--light);
}

.article-body {
  padding:14px 18px 16px;
  font-family:'Noto Serif KR',serif;
  font-size:.92rem; line-height:1.9;
  color:var(--body-text); word-break:keep-all;
}

/* ── 하이라이트 ─────────────────────── */
.dict-term {
  cursor:pointer; color:var(--blue);
  border-bottom:2px solid var(--blue);
  font-weight:600; transition:background .12s; border-radius:1px;
}
.dict-term:hover { background:rgba(63,114,175,.1); }

.deleg-term {
  cursor:pointer; color:var(--deleg-text);
  border-bottom:2px dotted var(--deleg-border);
  transition:background .12s;
}
.deleg-term:hover { background:rgba(219,226,239,.15); }

/* ── 판례 배지 ──────────────────────── */
.case-badge {
  display:inline-block; cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;
  font-size:.55rem; font-weight:700; letter-spacing:.04em;
  padding:1px 5px 0;
  background:var(--navy); color:var(--light);
  border-radius:6px;
  border:1px solid rgba(63,114,175,.5);
  margin-left:2px;
  vertical-align:super; line-height:1.7;
  transition:all .12s; white-space:nowrap;
}
.case-badge:hover { background:var(--blue); color:#fff; border-color:var(--blue); }
.bochu-badge {
  background:#F0F2F5; color:var(--muted);
  border:1px solid var(--border);
}
.bochu-badge:hover { background:var(--muted); color:#fff; border-color:var(--muted); }

/* ── 팝업 ──────────────────────────── */
#popup-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(17,45,78,.55); z-index:400;
  backdrop-filter:blur(2px);
}
#popup-overlay.active { display:block; }

#popup {
  display:none; position:fixed;
  top:50%; left:50%; transform:translate(-50%,-50%);
  z-index:500; width:min(560px,94vw);
  max-height:82vh;
  background:var(--card); border-radius:12px;
  box-shadow:0 24px 64px rgba(17,45,78,.45),0 0 0 1px rgba(63,114,175,.2);
  overflow:hidden; flex-direction:column;
}
#popup.active { display:flex; animation:popIn .18s cubic-bezier(.34,1.56,.64,1); }
@keyframes popIn {
  from { opacity:0; transform:translate(-50%,-50%) scale(.93); }
  to   { opacity:1; transform:translate(-50%,-50%) scale(1); }
}
#popup-header {
  background:var(--navy);
  padding:14px 48px 14px 18px;
  border-bottom:2px solid var(--blue);
  flex-shrink:0; position:relative;
}
#popup-close {
  position:absolute; top:10px; right:12px;
  background:none; border:none; cursor:pointer;
  color:rgba(219,226,239,.7); font-size:1.1rem;
  line-height:1; padding:6px; border-radius:4px;
  transition:all .12s;
  min-width:36px; min-height:36px;
  display:flex; align-items:center; justify-content:center;
}
#popup-close:hover { color:#fff; background:rgba(219,226,239,.15); }
.popup-type-label {
  font-size:.64rem; font-weight:700; letter-spacing:.1em;
  color:rgba(219,226,239,.6); text-transform:uppercase; margin-bottom:3px;
}
.popup-term-title {
  font-size:1rem; font-weight:700;
  color:var(--light); font-family:'Noto Serif KR',serif;
}
#popup-body {
  padding:16px 18px; font-family:'Noto Serif KR',serif;
  font-size:.88rem; line-height:1.82; color:var(--popup-text);
  overflow-y:auto; flex:1;
}
#popup-body::-webkit-scrollbar { width:4px; }
#popup-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
#popup-footer {
  background:var(--panel-bg); padding:8px 18px;
  border-top:1px solid var(--border);
  display:flex; justify-content:space-between; align-items:center;
  flex-shrink:0;
}
#popup-footer span { font-size:.7rem; color:var(--muted); }

.case-entry {
  padding:10px 0; border-bottom:1px solid var(--entry-border);
}
.case-entry:last-child { border-bottom:none; padding-bottom:0; }
.case-type-tag {
  display:inline-block;
  font-size:.62rem; font-weight:700; letter-spacing:.05em;
  padding:1px 7px; border-radius:8px; margin-bottom:5px;
}
.판례-tag { background:var(--navy); color:var(--light); }
.보충-tag { background:var(--tag-bg); color:var(--muted); border:1px solid var(--border); }
.deleg-phrase {
  font-size:.8rem; color:var(--muted);
  border-left:3px solid var(--light);
  padding:5px 12px; margin-bottom:10px;
  background:var(--panel-bg); border-radius:0 4px 4px 0;
}
.deleg-label { font-size:.68rem; font-weight:700; letter-spacing:.08em; color:var(--muted); margin-bottom:3px; }
.deleg-target { font-size:.93rem; font-weight:600; color:var(--navy); }

/* ── 위로 버튼 ──────────────────────── */
#scroll-top {
  position:fixed; bottom:24px; right:24px;
  width:44px; height:44px; border-radius:50%;
  background:var(--blue); color:#fff;
  border:none; cursor:pointer; font-size:1rem;
  display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity .25s,transform .2s;
  z-index:100;
  box-shadow:0 3px 12px rgba(63,114,175,.4);
}
#scroll-top.visible { opacity:1; }
#scroll-top:hover { transform:translateY(-2px); }

/* ── 반응형 ─────────────────────────── */
@media (max-width:820px) {
  #toc { transform:translateX(-100%); }
  #toc.open { transform:translateX(0); box-shadow:4px 0 24px rgba(17,45,78,.35); }
  #menu-btn { display:flex; }
  #main { margin-left:0; padding:20px 16px 80px; }
  .legend { display:none; }
  #search-wrap { max-width:none; }
  #search-count { display:none; }
}
@media (max-width:480px) {
  #site-header { padding:0 12px; gap:10px; }
  #header-title .subtitle { display:none; }
  .article-body { font-size:.88rem; line-height:1.8; padding:12px 14px 14px; }
  .article-title-sect { display:none; }  /* 아주 좁은 화면엔 절명 숨김 */
  #popup { width:97vw; max-height:88vh; }
}
mark.search-hi {
  background:#ffe066; color:var(--text);
  padding:0 1px; border-radius:2px;
}
/* ── 법령 체계도 ─────────────────── */
.hier-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:10px; overflow:hidden;
  margin-bottom:16px;
}
.hier-title {
  background:var(--navy); padding:6px 14px;
  display:flex; align-items:center; justify-content:space-between;
  cursor:pointer; user-select:none;
  border-bottom:1px solid rgba(63,114,175,.3);
}
.hier-title:hover { background:rgba(17,45,78,.85); }
.hier-title span:first-child {
  font-family:'Noto Serif KR',serif;
  font-size:.82rem; font-weight:700;
  color:var(--light); letter-spacing:.06em;
}
.hier-body {
  overflow:hidden; transition:max-height .4s ease, opacity .3s ease;
  max-height:0; opacity:0; padding:0 18px;
}
.hier-body.open { max-height:3000px; opacity:1; padding:18px; }
.hier-row {
  display:flex; flex-direction:column; align-items:center;
}
.hier-label {
  font-size:.65rem; color:var(--muted); letter-spacing:.06em;
  margin-bottom:3px;
}
.hier-items { display:flex; gap:6px; align-items:center; flex-wrap:wrap; justify-content:center; }
.hier-btn {
  padding:5px 14px; border-radius:6px;
  font-size:.82rem; font-weight:600;
  font-family:'Noto Serif KR',serif;
  cursor:pointer; transition:all .15s;
  background:rgba(63,114,175,.06);
  border:1.5px solid;
}
.hier-btn:hover { transform:translateY(-1px); filter:brightness(1.1); }
.hier-btn.active { color:#fff !important; transform:translateY(-1px); }
.hier-note { font-size:.6rem; color:var(--muted); margin-left:2px; white-space:nowrap; }
.hier-conn {
  width:1px; height:14px; background:var(--border); margin:4px 0;
}
.hier-desc {
  margin-top:14px; padding:14px 16px;
  background:rgba(63,114,175,.04);
  border:1px solid var(--border);
  border-left:3px solid var(--blue);
  border-radius:0 8px 8px 0;
  animation:fadeSlide .2s ease;
}
@keyframes fadeSlide { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
.hier-desc-title {
  display:flex; justify-content:space-between; align-items:flex-start;
  margin-bottom:6px; gap:8px;
}
.hier-desc-name { font-size:.95rem; font-weight:700; color:var(--navy); }
.hier-desc-maker {
  font-size:.65rem; color:var(--muted);
  background:var(--panel-bg); padding:2px 8px;
  border-radius:4px; white-space:nowrap; flex-shrink:0;
}
.hier-desc-text {
  font-size:.84rem; line-height:1.75; color:var(--body-text);
  font-family:'Noto Serif KR',serif;
}
.hier-tabs { display:flex; gap:6px; margin-bottom:16px; }
.hier-tab {
  padding:4px 12px; font-size:.75rem; border-radius:4px;
  border:1px solid var(--border);
  background:transparent; color:var(--muted);
  cursor:pointer; transition:all .15s;
  font-family:'Noto Sans KR',sans-serif;
}
.hier-tab.active {
  background:var(--navy); color:var(--light);
  border-color:var(--navy);
}
.cpill {
  padding:4px 12px; border-radius:16px;
  border:1px solid var(--border);
  background:rgba(63,114,175,.04);
  color:var(--text); font-size:.78rem;
  cursor:pointer; transition:all .15s;
  font-family:'Noto Sans KR',sans-serif;
}
.cpill:hover { border-color:var(--blue); }
.cpill.active {
  background:var(--blue); color:#fff;
  border-color:var(--blue);
}
.hier-hint { text-align:center; color:var(--muted); font-size:.75rem; padding:8px 0; }

/* ── 전문 접기/펼치기 ───────────── */
.pre-toggle {
  cursor:pointer; user-select:none;
  display:flex; align-items:center; justify-content:space-between;
}
.pre-toggle:hover { background:rgba(63,114,175,.25); }
.pre-chev {
  font-size:.7rem; color:var(--light); transition:transform .2s;
  margin-right:4px;
}
.pre-chev.open { transform:rotate(90deg); }
.pre-body {
  overflow:hidden; transition:max-height .35s ease, opacity .25s ease;
  max-height:0; opacity:0;
}
.pre-body.open { max-height:2000px; opacity:1; }

/* ── 팝업 내 사전 링크 ──────────── */
.dict-ref {
  color:var(--blue); cursor:pointer;
  border-bottom:1px dotted var(--blue);
  transition:color .15s;
}
.dict-ref:hover { color:var(--navy); }

/* ── 다크모드 토글 ──────────────── */
#dark-toggle {
  background:none; border:1.2px solid rgba(219,226,239,.3);
  color:var(--light); font-size:.82rem; padding:5px 8px;
  border-radius:14px; cursor:pointer; flex-shrink:0;
  transition:background .15s, border-color .15s;
  min-width:36px; min-height:36px;
  display:flex; align-items:center; justify-content:center;
}
#dark-toggle:hover { background:rgba(219,226,239,.15); border-color:rgba(219,226,239,.5); }

/* ── 다크모드 ────────────────────── */
body.dark-mode {
  --bg:      #121520;
  --card:    #1a1f2e;
  --light:   #8eacc8;
  --blue:    #5b9bd5;
  --navy:    #161d2a;
  --text:    #d4d8e0;
  --muted:   #8a96a6;
  --border:  #2a3344;
  --body-text: #c8cdd5;
  --popup-text: #c0c8d2;
  --deleg-text: #8eacc8;
  --deleg-border: rgba(142,172,200,.35);
  --tag-bg:    #1e2636;
  --panel-bg:  #161d2a;
  --entry-border: #2a3344;
}
body.dark-mode #site-header {
  background:#0d1117;
  box-shadow:0 2px 16px rgba(0,0,0,.6);
}
body.dark-mode #search {
  background:rgba(142,172,200,.1);
  border-color:rgba(142,172,200,.25);
  color:#d4d8e0;
}
body.dark-mode .article-card {
  background:var(--card);
  border-color:var(--border);
  box-shadow:0 1px 6px rgba(0,0,0,.3);
}
body.dark-mode .article-title {
  background:#1e2636;
  border-color:var(--border);
}
body.dark-mode .article-title-num { color:var(--light); }
body.dark-mode .article-title-sect { color:var(--blue); }
body.dark-mode .preamble-card .article-title,
body.dark-mode .chapter-header {
  background:var(--navy);
}
body.dark-mode .chapter-header span { color:var(--light); }
body.dark-mode .dict-term { color:#7cb8e8; border-color:rgba(124,184,232,.4); }
body.dark-mode .dict-term:hover { background:rgba(91,155,213,.15); }
body.dark-mode .deleg-term:hover { background:rgba(142,172,200,.1); }
body.dark-mode .case-badge { background:rgba(91,155,213,.2); color:#8ec5f0; border-color:rgba(91,155,213,.4); }
body.dark-mode .bochu-badge { background:rgba(142,172,200,.15); color:#a0bcd0; border-color:rgba(142,172,200,.3); }
body.dark-mode #popup {
  background:#1a1f2e; color:var(--popup-text);
  border-color:var(--border);
  box-shadow:0 12px 48px rgba(0,0,0,.6);
}
body.dark-mode #popup-header { background:#0d1117; }
body.dark-mode .popup-term-title { color:#d4d8e0; }
body.dark-mode #popup-body { color:var(--popup-text); }
body.dark-mode #popup-body p { color:var(--popup-text); }
body.dark-mode #popup-footer { background:var(--panel-bg); border-color:var(--border); }
body.dark-mode #popup-footer span { color:var(--muted); }
