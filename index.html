<script>
const CONSTITUTION = [{"type": "chapter", "text": "전문", "id": "ch0"}, {"type": "article", "id": "전문", "title": "전문", "text": "유구한 역사와 전통에 빛나는 우리 대한국민은 3·1운동으로 건립된 대한민국임시정부의 법통과 불의에 항거한 4·19민주이념을 계승하고, 조국의 민주개혁과 평화적 통일의 사명에 입각하여 정의·인도와 동포애로써 민족의 단결을 공고히 하고, 모든 사회적 폐습과 불의를 타파하며, 자율과 조화를 바탕으로 자유민주적 기본질서를 더욱 확고히 하여 정치·경제·사회·문화의 모든 영역에 있어서 각인의 기회를 균등히 하고, 능력을 최고도로 발휘하게 하며, 자유와 권리에 따르는 책임과 의무를 완수하게 하여, 안으로는 국민생활의 균등한 향상을 기하고 밖으로는 항구적인 세계평화와 인류공영에 이바지함으로써 우리들과 우리들의 자손의 안전과 자유와 행복을 영원히 확보할 것을 다짐하면서 1948년 7월 12일에 제정되고 8차에 걸쳐 개정된 헌법을 이제 국회의 의결을 거쳐 국민투표에 의하여 개정한다.", "section": null}, {"type": "chapter", "text": "제1장 총강", "id": "ch1"}, {"type": "article", "id": "1", "title": "제1조", "text": "①대한민국은 민주공화국이다. ②대한민국의 주권은 국민에게 있고, 모든 권력은 국민으로부터 나온다.", "section": null}, {"type": "article", "id": "2", "title": "제2조", "text": "①대한민국의 국민이 되는 요건은 법률로 정한다. ②국가는 법률이 정하는 바에 의하여 재외국민을 보호할 의무를 진다.", "section": null}, {"type": "article", "id": "3", "title": "제3조", "text": "대한민국의 영토는 한반도와 그 부속도서로 한다.", "section": null}, {"type": "article", "id": "4", "title": "제4조", "text": "대한민국은 통일을 지향하며, 자유민주적 기본질서에 입각한 평화적 통일 정책을 수립하고 이를 추 진한다.", "section": null}, {"type": "article", "id": "5", "title": "제5조", "text": "①대한민국은 국제평화의 유지에 노력하고 침략적 전쟁을 부인한다. ②국군은 국가의 안전보장과 국토방위의 신성한 의무를 수행함을 사명으로 하며, 그 정치적 중립성은 준수된다.", "section": null}, {"type": "article", "id": "6", "title": "제6조", "text": "①헌법에 의하여 체결·공포된 조약과 일반적으로 승인된 국제법규는 국내법과 같은 효력을 가진다. ②외국인은 국제법과 조약이 정하는 바에 의하여 그 지위가 보장된다.", "section": null}, {"type": "article", "id": "7", "title": "제7조", "text": "①공무원은 국민전체에 대한 봉사자이며, 국민에 대하여 책임을 진다. ②공무원의 신분과 정치적 중립성은 법률이 정하는 바에 의하여 보장된다.", "section": null}, {"type": "article", "id": "8", "title": "제8조", "text": "①정당의 설립은 자유이며, 복수정당제는 보장된다. ②정당은 그 목적·조직과 활동이 민주적이어야 하며, 국민의 정치적 의사형성에 참여하는데 필요한 조직을 가져야 한다. ③정당은 법률이 정하는 바에 의하여 국가의 보호를 받으며, 국가는 법률이 정하는 바에 의하여 정당운영에 필요한 자금을 보조할 수 있다. ④정당의 목적이나 활동이 민주적 기본질서에 위배될 때에는 정부는 헌법재판소에 그 해산을 제소할 수 있고, 정당은 헌법재판소의 심판에 의하여 해산된다.", "section": null}, {"type": "article", "id": "9", "title": "제9조", "text": "국가는 전통문화의 계승·발전과 민족문화의 창달에 노력하여야 한다.", "section": null}, {"type": "chapter", "text": "제2장 국민의 권리와 의무", "id": "ch2"}, {"type": "article", "id": "10", "title": "제10조", "text": "모든 국민은 인간으로서의 존엄과 가치를 가지며, 행복을 추구할 권리를 가진다. 국가는 개인이 가지 는 불가침의 기본적 인권을 확인하고 이를 보장할 의무를 진다.", "section": null}, {"type": "article", "id": "11", "title": "제11조", "text": "①모든 국민은 법 앞에 평등하다. 누구든지 성별·종교 또는 사회적 신분에 의하여 정치적·경제적·사 회적·문화적 생활의 모든 영역에 있어서 차별을 받지 아니한다. ②사회적 특수계급의 제도는 인정되지 아니하며, 어떠한 형태로도 이를 창설할 수 없다. ③훈장등의 영전은 이를 받은 자에게만 효력이 있고, 어떠한 특권도 이에 따르지 아니한다.", "section": null}, {"type": "article", "id": "12", "title": "제12조", "text": "①모든 국민은 신체의 자유를 가진다. 누구든지 법률에 의하지 아니하고는 체포·구속·압수·수색 또는 심문을 받지 아니하며, 법률과 적법한 절차에 의하지 아니하고는 처벌·보안처분 또는 강제노역을 받지 아니한다. ②모든 국민은 고문을 받지 아니하며, 형사상 자기에게 불리한 진술을 강요당하지 아니한다. ③체포·구속·압수 또는 수색을 할 때에는 적법한 절차에 따라 검사의 신청에 의하여 법관이 발부한 영장을 제시하여야 한다. 다만, 현행범인인 경우와 장기 3년이상의 형에 해당하는 죄를 범하고 도피 또는 증거인멸의 염려가 있을 때에는 사후에 영장을 청구할 수 있다. ④누구든지 체포 또는 구속을 당한 때에는 즉시 변호인의 조력을 받을 권리를 가진다. 다만, 형사피고인이 스스로 변호인을 구할 수 없을 때에는 법률이 정하는 바에 의하여 국가가 변호인을 붙인다. ⑤누구든지 체포 또는 구속의 이유와 변호인의 조력을 받을 권리가 있음을 고지받지 아니하고는 체포 또는 구속을 당하지 아니한다. 체포 또는 구속을 당한 자의 가족등 법률이 정하는 자에게는 그 이유와 일시·장소가 지체없이 통지되어야 한다. ⑥누구든지 체포 또는 구속을 당한 때에는 적부의 심사를 법원에 청구할 권리를 가진다. ⑦피고인의 자백이 고문·폭행·협박·구속의 부당한 장기화 또는 기망 기타의 방법에 의하여 자의로 진술된 것이 아니라고 인정될 때 또는 정식재판에 있어서 피고인의 자백이 그에게 불리한 유일한 증거일 때에는 이를 유죄의 증거로 삼거나 이를 이유로 처벌할 수 없다.", "section": null}, {"type": "article", "id": "13", "title": "제13조", "text": "①모든 국민은 행위시의 법률에 의하여 범죄를 구성하지 아니하는 행위로 소추되지 아니하며, 동일 한 범죄에 대하여 거듭 처벌받지 아니한다. ②모든 국민은 소급입법에 의하여 참정권의 제한을 받거나 재산권을 박탈당하지 아니한다. ③모든 국민은 자기의 행위가 아닌 친족의 행위로 인하여 불이익한 처우를 받지 아니한다.", "section": null}, {"type": "article", "id": "14", "title": "제14조", "text": "모든 국민은 거주·이전의 자유를 가진다.", "section": null}, {"type": "article", "id": "15", "title": "제15조", "text": "모든 국민은 직업선택의 자유를 가진다.", "section": null}, {"type": "article", "id": "16", "title": "제16조", "text": "모든 국민은 주거의 자유를 침해받지 아니한다. 주거에 대한 압수나 수색을 할 때에는 검사의 신청 에 의하여 법관이 발부한 영장을 제시하여야 한다.", "section": null}, {"type": "article", "id": "17", "title": "제17조", "text": "모든 국민은 사생활의 비밀과 자유를 침해받지 아니한다.", "section": null}, {"type": "article", "id": "18", "title": "제18조", "text": "모든 국민은 통신의 비밀을 침해받지 아니한다.", "section": null}, {"type": "article", "id": "19", "title": "제19조", "text": "모든 국민은 양심의 자유를 가진다.", "section": null}, {"type": "article", "id": "20", "title": "제20조", "text": "①모든 국민은 종교의 자유를 가진다. ②국교는 인정되지 아니하며, 종교와 정치는 분리된다.", "section": null}, {"type": "article", "id": "21", "title": "제21조", "text": "①모든 국민은 언론·출판의 자유와 집회·결사의 자유를 가진다. ②언론·출판에 대한 허가나 검열과 집회·결사에 대한 허가는 인정되지 아니한다. ③통신·방송의 시설기준과 신문의 기능을 보장하기 위하여 필요한 사항은 법률로 정한다. ④언론·출판은 타인의 명예나 권리 또는 공중도덕이나 사회윤리를 침해하여서는 아니된다. 언론·출판이 타인의 명예나 권리를 침해한 때에는 피해자는 이에 대한 피해의 배상을 청구할 수 있다.", "section": null}, {"type": "article", "id": "22", "title": "제22조", "text": "①모든 국민은 학문과 예술의 자유를 가진다. ②저작자·발명가·과학기술자와 예술가의 권리는 법률로써 보호한다.", "section": null}, {"type": "article", "id": "23", "title": "제23조", "text": "①모든 국민의 재산권은 보장된다. 그 내용과 한계는 법률로 정한다. ②재산권의 행사는 공공복리에 적합하도록 하여야 한다. ③공공필요에 의한 재산권의 수용·사용 또는 제한 및 그에 대한 보상은 법률로써 하되, 정당한 보상을 지급하여야 한다.", "section": null}, {"type": "article", "id": "24", "title": "제24조", "text": "모든 국민은 법률이 정하는 바에 의하여 선거권을 가진다.", "section": null}, {"type": "article", "id": "25", "title": "제25조", "text": "모든 국민은 법률이 정하는 바에 의하여 공무담임권을 가진다.", "section": null}, {"type": "article", "id": "26", "title": "제26조", "text": "①모든 국민은 법률이 정하는 바에 의하여 국가기관에 문서로 청원할 권리를 가진다. ②국가는 청원에 대하여 심사할 의무를 진다.", "section": null}, {"type": "article", "id": "27", "title": "제27조", "text": "①모든 국민은 헌법과 법률이 정한 법관에 의하여 법률에 의한 재판을 받을 권리를 가진다. ②군인 또는 군무원이 아닌 국민은 대한민국의 영역안에서는 중대한 군사상 기밀·초병·초소·유독음식물공급·포로·군용물에 관한 죄중 법률이 정한 경우와 비상계엄이 선포된 경우를 제외하고는 군사법원의 재판을 받지 아니한다. ③모든 국민은 신속한 재판을 받을 권리를 가진다. 형사피고인은 상당한 이유가 없는 한 지체없이 공개재판을 받을 권리를 가진다. ④형사피고인은 유죄의 판결이 확정될 때까지는 무죄로 추정된다. ⑤형사피해자는 법률이 정하는 바에 의하여 당해 사건의 재판절차에서 진술할 수 있다.", "section": null}, {"type": "article", "id": "28", "title": "제28조", "text": "형사피의자 또는 형사피고인으로서 구금되었던 자가 법률이 정하는 불기소처분을 받거나 무죄판결 을 받은 때에는 법률이 정하는 바에 의하여 국가에 정당한 보상을 청구할 수 있다.", "section": null}, {"type": "article", "id": "29", "title": "제29조", "text": "①공무원의 직무상 불법행위로 손해를 받은 국민은 법률이 정하는 바에 의하여 국가 또는 공공단체 에 정당한 배상을 청구할 수 있다. 이 경우 공무원 자신의 책임은 면제되지 아니한다. ②군인·군무원·경찰공무원 기타 법률이 정하는 자가 전투·훈련등 직무집행과 관련하여 받은 손해에 대하여는 법률이 정하는 보상외에 국가 또는 공공단체에 공무원의 직무상 불법행위로 인한 배상은 청구할 수 없다.", "section": null}, {"type": "article", "id": "30", "title": "제30조", "text": "타인의 범죄행위로 인하여 생명·신체에 대한 피해를 받은 국민은 법률이 정하는 바에 의하여 국가로 부터 구조를 받을 수 있다.", "section": null}, {"type": "article", "id": "31", "title": "제31조", "text": "①모든 국민은 능력에 따라 균등하게 교육을 받을 권리를 가진다. ②모든 국민은 그 보호하는 자녀에게 적어도 초등교육과 법률이 정하는 교육을 받게 할 의무를 진다. ③의무교육은 무상으로 한다. ④교육의 자주성·전문성·정치적 중립성 및 대학의 자율성은 법률이 정하는 바에 의하여 보장된다. ⑤국가는 평생교육을 진흥하여야 한다. ⑥학교교육 및 평생교육을 포함한 교육제도와 그 운영, 교육재정 및 교원의 지위에 관한 기본적인 사항은 법률로 정한다.", "section": null}, {"type": "article", "id": "32", "title": "제32조", "text": "①모든 국민은 근로의 권리를 가진다. 국가는 사회적·경제적 방법으로 근로자의 고용의 증진과 적정 임금의 보장에 노력하여야 하며, 법률이 정하는 바에 의하여 최저임금제를 시행하여야 한다. ②모든 국민은 근로의 의무를 진다. 국가는 근로의 의무의 내용과 조건을 민주주의원칙에 따라 법률로 정한다. ③근로조건의 기준은 인간의 존엄성을 보장하도록 법률로 정한다. ④여자의 근로는 특별한 보호를 받으며, 고용·임금 및 근로조건에 있어서 부당한 차별을 받지 아니한다. ⑤연소자의 근로는 특별한 보호를 받는다. ⑥국가유공자·상이군경 및 전몰군경의 유가족은 법률이 정하는 바에 의하여 우선적으로 근로의 기회를 부여받는다.", "section": null}, {"type": "article", "id": "33", "title": "제33조", "text": "①근로자는 근로조건의 향상을 위하여 자주적인 단결권·단체교섭권 및 단체행동권을 가진다. ②공무원인 근로자는 법률이 정하는 자에 한하여 단결권·단체교섭권 및 단체행동권을 가진다. ③법률이 정하는 주요방위산업체에 종사하는 근로자의 단체행동권은 법률이 정하는 바에 의하여 이를 제한하거나 인정하지 아니할 수 있다.", "section": null}, {"type": "article", "id": "34", "title": "제34조", "text": "①모든 국민은 인간다운 생활을 할 권리를 가진다. ②국가는 사회보장·사회복지의 증진에 노력할 의무를 진다. ③국가는 여자의 복지와 권익의 향상을 위하여 노력하여야 한다. ④국가는 노인과 청소년의 복지향상을 위한 정책을 실시할 의무를 진다. ⑤신체장애자 및 질병·노령 기타의 사유로 생활능력이 없는 국민은 법률이 정하는 바에 의하여 국가의 보호를 받는다. ⑥국가는 재해를 예방하고 그 위험으로부터 국민을 보호하기 위하여 노력하여야 한다.", "section": null}, {"type": "article", "id": "35", "title": "제35조", "text": "①모든 국민은 건강하고 쾌적한 환경에서 생활할 권리를 가지며, 국가와 국민은 환경보전을 위하여 노력하여야 한다. ②환경권의 내용과 행사에 관하여는 법률로 정한다. ③국가는 주택개발정책등을 통하여 모든 국민이 쾌적한 주거생활을 할 수 있도록 노력하여야 한다.", "section": null}, {"type": "article", "id": "36", "title": "제36조", "text": "①혼인과 가족생활은 개인의 존엄과 양성의 평등을 기초로 성립되고 유지되어야 하며, 국가는 이를 보장한다. ②국가는 모성의 보호를 위하여 노력하여야 한다. ③모든 국민은 보건에 관하여 국가의 보호를 받는다.", "section": null}, {"type": "article", "id": "37", "title": "제37조", "text": "①국민의 자유와 권리는 헌법에 열거되지 아니한 이유로 경시되지 아니한다. ②국민의 모든 자유와 권리는 국가안전보장·질서유지 또는 공공복리를 위하여 필요한 경우에 한하여 법률로써 제한할 수 있으며, 제한하는 경우에도 자유와 권리의 본질적인 내용을 침해할 수 없다.", "section": null}, {"type": "article", "id": "38", "title": "제38조", "text": "모든 국민은 법률이 정하는 바에 의하여 납세의 의무를 진다.", "section": null}, {"type": "article", "id": "39", "title": "제39조", "text": "①모든 국민은 법률이 정하는 바에 의하여 국방의 의무를 진다. ②누구든지 병역의무의 이행으로 인하여 불이익한 처우를 받지 아니한다.", "section": null}, {"type": "chapter", "text": "제3장 국회", "id": "ch3"}, {"type": "article", "id": "40", "title": "제40조", "text": "입법권은 국회에 속한다.", "section": null}, {"type": "article", "id": "41", "title": "제41조", "text": "①국회는 국민의 보통·평등·직접·비밀선거에 의하여 선출된 국회의원으로 구성한다. ②국회의원의 수는 법률로 정하되, 200인이상으로 한다. ③국회의원의 선거구와 비례대표제 기타 선거에 관한 사항은 법률로 정한다.", "section": null}, {"type": "article", "id": "42", "title": "제42조", "text": "국회의원의 임기는 4년으로 한다.", "section": null}, {"type": "article", "id": "43", "title": "제43조", "text": "국회의원은 법률이 정하는 직을 겸할 수 없다.", "section": null}, {"type": "article", "id": "44", "title": "제44조", "text": "①국회의원은 현행범인인 경우를 제외하고는 회기중 국회의 동의없이 체포 또는 구금되지 아니한다. ②국회의원이 회기전에 체포 또는 구금된 때에는 현행범인이 아닌 한 국회의 요구가 있으면 회기중 석방된다.", "section": null}, {"type": "article", "id": "45", "title": "제45조", "text": "국회의원은 국회에서 직무상 행한 발언과 표결에 관하여 국회외에서 책임을 지지 아니한다.", "section": null}, {"type": "article", "id": "46", "title": "제46조", "text": "①국회의원은 청렴의 의무가 있다. ②국회의원은 국가이익을 우선하여 양심에 따라 직무를 행한다. ③국회의원은 그 지위를 남용하여 국가·공공단체 또는 기업체와의 계약이나 그 처분에 의하여 재산상의 권리·이익 또는 직위를 취득하거나 타인을 위하여 그 취득을 알선할 수 없다.", "section": null}, {"type": "article", "id": "47", "title": "제47조", "text": "①국회의 정기회는 법률이 정하는 바에 의하여 매년 1회 집회되며, 국회의 임시회는 대통령 또는 국 회재적의원 4분의 1이상의 요구에 의하여 집회된다. ②정기회의 회기는 100일을, 임시회의 회기는 30일을 초과할 수 없다. ③대통령이 임시회의 집회를 요구할 때에는 기간과 집회요구의 이유를 명시하여야 한다.", "section": null}, {"type": "article", "id": "48", "title": "제48조", "text": "국회는 의장 1인과 부의장 2인을 선출한다.", "section": null}, {"type": "article", "id": "49", "title": "제49조", "text": "국회는 헌법 또는 법률에 특별한 규정이 없는 한 재적의원 과반수의 출석과 출석의원 과반수의 찬성 으로 의결한다. 가부동수인 때에는 부결된 것으로 본다.", "section": null}, {"type": "article", "id": "50", "title": "제50조", "text": "①국회의 회의는 공개한다. 다만, 출석의원 과반수의 찬성이 있거나 의장이 국가의 안전보장을 위하 여 필요하다고 인정할 때에는 공개하지 아니할 수 있다. ②공개하지 아니한 회의내용의 공표에 관하여는 법률이 정하는 바에 의한다.", "section": null}, {"type": "article", "id": "51", "title": "제51조", "text": "국회에 제출된 법률안 기타의 의안은 회기중에 의결되지 못한 이유로 폐기되지 아니한다. 다만, 국회 의원의 임기가 만료된 때에는 그러하지 아니하다.", "section": null}, {"type": "article", "id": "52", "title": "제52조", "text": "국회의원과 정부는 법률안을 제출할 수 있다.", "section": null}, {"type": "article", "id": "53", "title": "제53조", "text": "①국회에서 의결된 법률안은 정부에 이송되어 15일이내에 대통령이 공포한다. ②법률안에 이의가 있을 때에는 대통령은 제1항의 기간내에 이의서를 붙여 국회로 환부하고, 그 재의를 요구할 수 있다. 국회의 폐회중에도 또한 같다. ③대통령은 법률안의 일부에 대하여 또는 법률안을 수정하여 재의를 요구할 수 없다. ④재의의 요구가 있을 때에는 국회는 재의에 붙이고, 재적의원과반수의 출석과 출석의원 3분의 2이상의 찬성으로 전과 같은 의결을 하면 그 법률안은 법률로서 확정된다. ⑤대통령이 제1항의 기간내에 공포나 재의의 요구를 하지 아니한 때에도 그 법률안은 법률로서 확정된다. ⑥대통령은 제4항과 제5항의 규정에 의하여 확정된 법률을 지체없이 공포하여야 한다. 제5항에 의하여 법률이 확정된 후 또는 제4항에 의한 확정법률이 정부에 이송된 후 5일이내에 대통령이 공포하지 아니할 때에는 국회의장이 이를 공포한다. ⑦법률은 특별한 규정이 없는 한 공포한 날로부터 20일을 경과함으로써 효력을 발생한다.", "section": null}, {"type": "article", "id": "54", "title": "제54조", "text": "①국회는 국가의 예산안을 심의·확정한다. ②정부는 회계년도마다 예산안을 편성하여 회계년도 개시 90일전까지 국회에 제출하고, 국회는 회계년도 개시 30일전까지 이를 의결하여야 한다. ③새로운 회계년도가 개시될 때까지 예산안이 의결되지 못한 때에는 정부는 국회에서 예산안이 의결될 때까지 다음의 목적을 위한 경비는 전년도 예산에 준하여 집행할 수 있다. 1. 헌법이나 법률에 의하여 설치된 기관 또는 시설의 유지·운영 2. 법률상 지출의무의 이행 3. 이미 예산으로 승인된 사업의 계속", "section": null}, {"type": "article", "id": "55", "title": "제55조", "text": "①한 회계년도를 넘어 계속하여 지출할 필요가 있을 때에는 정부는 연한을 정하여 계속비로서 국회 의 의결을 얻어야 한다. ②예비비는 총액으로 국회의 의결을 얻어야 한다. 예비비의 지출은 차기국회의 승인을 얻어야 한다.", "section": null}, {"type": "article", "id": "56", "title": "제56조", "text": "정부는 예산에 변경을 가할 필요가 있을 때에는 추가경정예산안을 편성하여 국회에 제출할수 있다.", "section": null}, {"type": "article", "id": "57", "title": "제57조", "text": "국회는 정부의 동의 없이 정부가 제출한 지출예산 각항의 금액을 증가하거나 새 비목을 설치할 수 없다.", "section": null}, {"type": "article", "id": "58", "title": "제58조", "text": "국채를 모집하거나 예산외에 국가의 부담이 될 계약을 체결하려 할 때에는 정부는 미리 국회의 의결 을 얻어야 한다.", "section": null}, {"type": "article", "id": "59", "title": "제59조", "text": "조세의 종목과 세율은 법률로 정한다.", "section": null}, {"type": "article", "id": "60", "title": "제60조", "text": "①국회는 상호원조 또는 안전보장에 관한 조약, 중요한 국제조직에 관한 조약, 우호통상항해조약, 주권의 제약에 관한 조약, 강화조약, 국가나 국민에게 중대한 재정적 부담을 지우는 조약 또는 입법사항에 관한 조약의 체결·비준에 대한 동의권을 가진다. ②국회는 선전포고, 국군의 외국에의 파견 또는 외국군대의 대한민국 영역안에서의 주류에 대한 동의권을 가진다.", "section": null}, {"type": "article", "id": "61", "title": "제61조", "text": "①국회는 국정을 감사하거나 특정한 국정사안에 대하여 조사할 수 있으며, 이에 필요한 서류의 제출 또는 증인의 출석과 증언이나 의견의 진술을 요구할 수 있다. ②국정감사 및 조사에 관한 절차 기타 필요한 사항은 법률로 정한다.", "section": null}, {"type": "article", "id": "62", "title": "제62조", "text": "①국무총리·국무위원 또는 정부위원은 국회나 그 위원회에 출석하여 국정처리상황을 보고하거나 의 견을 진술하고 질문에 응답할 수 있다. ②국회나 그 위원회의 요구가 있을 때에는 국무총리·국무위원 또는 정부위원은 출석·답변하여야 하며, 국무총리 또는 국무위원이 출석요구를 받은 때에는 국무위원 또는 정부위원으로 하여금 출석·답변하게 할 수 있다.", "section": null}, {"type": "article", "id": "63", "title": "제63조", "text": "①국회는 국무총리 또는 국무위원의 해임을 대통령에게 건의할 수 있다. ②제1항의 해임건의는 국회재적의원 3분의 1이상의 발의에 의하여 국회재적의원 과반수의 찬성이 있어야 한다.", "section": null}, {"type": "article", "id": "64", "title": "제64조", "text": "①국회는 법률에 저촉되지 아니하는 범위안에서 의사와 내부규율에 관한 규칙을 제정할 수 있다. ②국회는 의원의 자격을 심사하며, 의원을 징계할 수 있다. ③의원을 제명하려면 국회재적의원 3분의 2이상의 찬성이 있어야 한다. ④제2항과 제3항의 처분에 대하여는 법원에 제소할 수 없다.", "section": null}, {"type": "article", "id": "65", "title": "제65조", "text": "①대통령·국무총리·국무위원·행정각부의 장·헌법재판소 재판관·법관·중앙선거관리위원회 위원·감사 원장·감사위원 기타 법률이 정한 공무원이 그 직무집행에 있어서 헌법이나 법률을 위배한 때에는 국회는 탄핵의 소추를 의결할 수 있다. ②제1항의 탄핵소추는 국회재적의원 3분의 1이상의 발의가 있어야 하며, 그 의결은 국회재적의원 과반수의 찬성이 있어야 한다. 다만, 대통령에 대한 탄핵소추는 국회재적의원 과반수의 발의와 국회재적의원 3분의 2이상의 찬성이 있어야 한다. ③탄핵소추의 의결을 받은 자는 탄핵심판이 있을 때까지 그 권한행사가 정지된다. ④탄핵결정은 공직으로부터 파면함에 그친다. 그러나, 이에 의하여 민사상이나 형사상의 책임이 면제되지는 아니한다.", "section": null}, {"type": "chapter", "text": "제4장 정부", "id": "ch4"}, {"type": "article", "id": "66", "title": "제66조", "text": "①대통령은 국가의 원수이며, 외국에 대하여 국가를 대표한다. ②대통령은 국가의 독립·영토의 보전·국가의 계속성과 헌법을 수호할 책무를 진다. ③대통령은 조국의 평화적 통일을 위한 성실한 의무를 진다. ④행정권은 대통령을 수반으로 하는 정부에 속한다.", "section": "제1절 대통령"}, {"type": "article", "id": "67", "title": "제67조", "text": "①대통령은 국민의 보통·평등·직접·비밀선거에 의하여 선출한다. ②제1항의 선거에 있어서 최고득표자가 2인이상인 때에는 국회의 재적의원 과반수가 출석한 공개회의에서 다수표를 얻은 자를 당선자로 한다. ③대통령후보자가 1인일 때에는 그 득표수가 선거권자 총수의 3분의 1이상이 아니면 대통령으로 당선될 수 없다. ④대통령으로 선거될 수 있는 자는 국회의원의 피선거권이 있고 선거일 현재 40세에 달하여야 한다. ⑤대통령의 선거에 관한 사항은 법률로 정한다.", "section": "제1절 대통령"}, {"type": "article", "id": "68", "title": "제68조", "text": "①대통령의 임기가 만료되는 때에는 임기만료 70일 내지 40일전에 후임자를 선거한다. ②대통령이 궐위된 때 또는 대통령 당선자가 사망하거나 판결 기타의 사유로 그 자격을 상실한 때에는 60일이내에 후임자를 선거한다.", "section": "제1절 대통령"}, {"type": "article", "id": "69", "title": "제69조", "text": "대통령은 취임에 즈음하여 다음의 선서를 한다. \"나는 헌법을 준수하고 국가를 보위하며 조국의 평화적 통일과 국민의 자유와 복리의 증진 및 민족문화의 창달에 노력하여 대통령으로서의 직책을 성실히 수행할 것을 국민 앞에 엄숙히 선서합니다.\"", "section": "제1절 대통령"}, {"type": "article", "id": "70", "title": "제70조", "text": "대통령의 임기는 5년으로 하며, 중임할 수 없다.", "section": "제1절 대통령"}, {"type": "article", "id": "71", "title": "제71조", "text": "대통령이 궐위되거나 사고로 인하여 직무를 수행할 수 없을 때에는 국무총리, 법률이 정한 국무위원 의 순서로 그 권한을 대행한다.", "section": "제1절 대통령"}, {"type": "article", "id": "72", "title": "제72조", "text": "대통령은 필요하다고 인정할 때에는 외교·국방·통일 기타 국가안위에 관한 중요정책을 국민투표에 붙일 수 있다.", "section": "제1절 대통령"}, {"type": "article", "id": "73", "title": "제73조", "text": "대통령은 조약을 체결·비준하고, 외교사절을 신임·접수 또는 파견하며, 선전포고와 강화를 한다.", "section": "제1절 대통령"}, {"type": "article", "id": "74", "title": "제74조", "text": "①대통령은 헌법과 법률이 정하는 바에 의하여 국군을 통수한다. ②국군의 조직과 편성은 법률로 정한다.", "section": "제1절 대통령"}, {"type": "article", "id": "75", "title": "제75조", "text": "대통령은 법률에서 구체적으로 범위를 정하여 위임받은 사항과 법률을 집행하기 위하여 필요한 사 항에 관하여 대통령령을 발할 수 있다.", "section": "제1절 대통령"}, {"type": "article", "id": "76", "title": "제76조", "text": "①대통령은 내우·외환·천재·지변 또는 중대한 재정·경제상의 위기에 있어서 국가의 안전보장 또는 공 공의 안녕질서를 유지하기 위하여 긴급한 조치가 필요하고 국회의 집회를 기다릴 여유가 없을 때에 한하여 최소한으로 필요한 재정·경제상의 처분을 하거나 이에 관하여 법률의 효력을 가지는 명령을 발할 수 있다. ②대통령은 국가의 안위에 관계되는 중대한 교전상태에 있어서 국가를 보위하기 위하여 긴급한 조치가 필요하고 국회의 집회가 불가능한 때에 한하여 법률의 효력을 가지는 명령을 발할 수 있다. ③대통령은 제1항과 제2항의 처분 또는 명령을 한 때에는 지체없이 국회에 보고하여 그 승인을 얻어야 한다. ④제3항의 승인을 얻지 못한 때에는 그 처분 또는 명령은 그때부터 효력을 상실한다. 이 경우 그 명령에 의하여 개정 또는 폐지되었던 법률은 그 명령이 승인을 얻지 못한 때부터 당연히 효력을 회복한다. ⑤대통령은 제3항과 제4항의 사유를 지체없이 공포하여야 한다.", "section": "제1절 대통령"}, {"type": "article", "id": "77", "title": "제77조", "text": "①대통령은 전시·사변 또는 이에 준하는 국가비상사태에 있어서 병력으로써 군사상의 필요에 응하거 나 공공의 안녕질서를 유지할 필요가 있을 때에는 법률이 정하는 바에 의하여 계엄을 선포할 수 있다. ②계엄은 비상계엄과 경비계엄으로 한다. ③비상계엄이 선포된 때에는 법률이 정하는 바에 의하여 영장제도, 언론·출판·집회·결사의 자유, 정부나 법원의 권한에 관하여 특별한 조치를 할 수 있다. ④계엄을 선포한 때에는 대통령은 지체없이 국회에 통고하여야 한다. ⑤국회가 재적의원 과반수의 찬성으로 계엄의 해제를 요구한 때에는 대통령은 이를 해제하여야 한다.", "section": "제1절 대통령"}, {"type": "article", "id": "78", "title": "제78조", "text": "대통령은 헌법과 법률이 정하는 바에 의하여 공무원을 임면한다.", "section": "제1절 대통령"}, {"type": "article", "id": "79", "title": "제79조", "text": "①대통령은 법률이 정하는 바에 의하여 사면·감형 또는 복권을 명할 수 있다. ②일반사면을 명하려면 국회의 동의를 얻어야 한다. ③사면·감형 및 복권에 관한 사항은 법률로 정한다.", "section": "제1절 대통령"}, {"type": "article", "id": "80", "title": "제80조", "text": "대통령은 법률이 정하는 바에 의하여 훈장 기타의 영전을 수여한다.", "section": "제1절 대통령"}, {"type": "article", "id": "81", "title": "제81조", "text": "대통령은 국회에 출석하여 발언하거나 서한으로 의견을 표시할 수 있다.", "section": "제1절 대통령"}, {"type": "article", "id": "82", "title": "제82조", "text": "대통령의 국법상 행위는 문서로써 하며, 이 문서에는 국무총리와 관계 국무위원이 부서한다. 군사에 관한 것도 또한 같다.", "section": "제1절 대통령"}, {"type": "article", "id": "83", "title": "제83조", "text": "대통령은 국무총리·국무위원·행정각부의 장 기타 법률이 정하는 공사의 직을 겸할 수 없다.", "section": "제1절 대통령"}, {"type": "article", "id": "84", "title": "제84조", "text": "대통령은 내란 또는 외환의 죄를 범한 경우를 제외하고는 재직중 형사상의 소추를 받지 아니한다.", "section": "제1절 대통령"}, {"type": "article", "id": "85", "title": "제85조", "text": "전직대통령의 신분과 예우에 관하여는 법률로 정한다.", "section": "제1절 대통령"}, {"type": "article", "id": "86", "title": "제86조", "text": "①국무총리는 국회의 동의를 얻어 대통령이 임명한다. ②국무총리는 대통령을 보좌하며, 행정에 관하여 대통령의 명을 받아 행정각부를 통할한다. ③군인은 현역을 면한 후가 아니면 국무총리로 임명될 수 없다.", "section": "제1관 국무총리와 국무위원"}, {"type": "article", "id": "87", "title": "제87조", "text": "①국무위원은 국무총리의 제청으로 대통령이 임명한다. ②국무위원은 국정에 관하여 대통령을 보좌하며, 국무회의의 구성원으로서 국정을 심의한다. ③국무총리는 국무위원의 해임을 대통령에게 건의할 수 있다. ④군인은 현역을 면한 후가 아니면 국무위원으로 임명될 수 없다.", "section": "제1관 국무총리와 국무위원"}, {"type": "article", "id": "88", "title": "제88조", "text": "①국무회의는 정부의 권한에 속하는 중요한 정책을 심의한다. ②국무회의는 대통령·국무총리와 15인이상 30인이하의 국무위원으로 구성한다. ③대통령은 국무회의의 의장이 되고, 국무총리는 부의장이 된다.", "section": "제2관 국무회의"}, {"type": "article", "id": "89", "title": "제89조", "text": "다음 사항은 국무회의의 심의를 거쳐야 한다. 1. 국정의 기본계획과 정부의 일반정책 2. 선전·강화 기타 중요한 대외정책 3. 헌법개정안·국민투표안·조약안·법률안 및 대통령령안 4. 예산안·결산·국유재산처분의 기본계획·국가의 부담이 될 계약 기타 재정에 관한 중요사항 5. 대통령의 긴급명령·긴급재정경제처분 및 명령 또는 계엄과 그 해제 6. 군사에 관한 중요사항 7. 국회의 임시회 집회의 요구 8. 영전수여 9. 사면·감형과 복권 10. 행정각부간의 권한의 획정 11. 정부안의 권한의 위임 또는 배정에 관한 기본계획 12. 국정처리상황의 평가·분석 13. 행정각부의 중요한 정책의 수립과 조정 14. 정당해산의 제소 15. 정부에 제출 또는 회부된 정부의 정책에 관계되는 청원의 심사 16. 검찰총장·합동참모의장·각군참모총장·국립대학교총장·대사 기타 법률이 정한 공무원과 국영기업체관리자의 임명 17. 기타 대통령·국무총리 또는 국무위원이 제출한 사항", "section": "제2관 국무회의"}, {"type": "article", "id": "90", "title": "제90조", "text": "①국정의 중요한 사항에 관한 대통령의 자문에 응하기 위하여 국가원로로 구성되는 국가원로자문회 의를 둘 수 있다. ②국가원로자문회의의 의장은 직전대통령이 된다. 다만, 직전대통령이 없을 때에는 대통령이 지명한다. ③국가원로자문회의의 조직·직무범위 기타 필요한 사항은 법률로 정한다.", "section": "제2관 국무회의"}, {"type": "article", "id": "91", "title": "제91조", "text": "①국가안전보장에 관련되는 대외정책·군사정책과 국내정책의 수립에 관하여 국무회의의 심의에 앞 서 대통령의 자문에 응하기 위하여 국가안전보장회의를 둔다. ②국가안전보장회의는 대통령이 주재한다. ③국가안전보장회의의 조직·직무범위 기타 필요한 사항은 법률로 정한다.", "section": "제2관 국무회의"}, {"type": "article", "id": "92", "title": "제92조", "text": "①평화통일정책의 수립에 관한 대통령의 자문에 응하기 위하여 민주평화통일자문회의를 둘 수 있다. ②민주평화통일자문회의의 조직·직무범위 기타 필요한 사항은 법률로 정한다.", "section": "제2관 국무회의"}, {"type": "article", "id": "93", "title": "제93조", "text": "①국민경제의 발전을 위한 중요정책의 수립에 관하여 대통령의 자문에 응하기 위하여 국민경제자문 회의를 둘 수 있다. ②국민경제자문회의의 조직·직무범위 기타 필요한 사항은 법률로 정한다.", "section": "제2관 국무회의"}, {"type": "article", "id": "94", "title": "제94조", "text": "행정각부의 장은 국무위원 중에서 국무총리의 제청으로 대통령이 임명한다.", "section": "제3관 행정각부"}, {"type": "article", "id": "95", "title": "제95조", "text": "국무총리 또는 행정각부의 장은 소관사무에 관하여 법률이나 대통령령의 위임 또는 직권으로 총리령 또는 부령을 발할 수 있다.", "section": "제3관 행정각부"}, {"type": "article", "id": "96", "title": "제96조", "text": "행정각부의 설치·조직과 직무범위는 법률로 정한다.", "section": "제3관 행정각부"}, {"type": "article", "id": "97", "title": "제97조", "text": "국가의 세입·세출의 결산, 국가 및 법률이 정한 단체의 회계검사와 행정기관 및 공무원의 직무에 관 한 감찰을 하기 위하여 대통령 소속하에 감사원을 둔다.", "section": "제4관 감사원"}, {"type": "article", "id": "98", "title": "제98조", "text": "①감사원은 원장을 포함한 5인이상 11인이하의 감사위원으로 구성한다. ②원장은 국회의 동의를 얻어 대통령이 임명하고, 그 임기는 4년으로 하며, 1차에 한하여 중임할 수 있다. ③감사위원은 원장의 제청으로 대통령이 임명하고, 그 임기는 4년으로 하며, 1차에 한하여 중임할 수 있다.", "section": "제4관 감사원"}, {"type": "article", "id": "99", "title": "제99조", "text": "감사원은 세입·세출의 결산을 매년 검사하여 대통령과 차년도국회에 그 결과를 보고하여야 한다.", "section": "제4관 감사원"}, {"type": "article", "id": "100", "title": "제100조", "text": "감사원의 조직·직무범위·감사위원의 자격·감사대상공무원의 범위 기타 필요한 사항은 법률로 정 한다.", "section": "제4관 감사원"}, {"type": "chapter", "text": "제5장 법원", "id": "ch5"}, {"type": "article", "id": "101", "title": "제101조", "text": "①사법권은 법관으로 구성된 법원에 속한다. ②법원은 최고법원인 대법원과 각급법원으로 조직된다. ③법관의 자격은 법률로 정한다.", "section": null}, {"type": "article", "id": "102", "title": "제102조", "text": "①대법원에 부를 둘 수 있다. ②대법원에 대법관을 둔다. 다만, 법률이 정하는 바에 의하여 대법관이 아닌 법관을 둘 수 있다. ③대법원과 각급법원의 조직은 법률로 정한다.", "section": null}, {"type": "article", "id": "103", "title": "제103조", "text": "법관은 헌법과 법률에 의하여 그 양심에 따라 독립하여 심판한다.", "section": null}, {"type": "article", "id": "104", "title": "제104조", "text": "①대법원장은 국회의 동의를 얻어 대통령이 임명한다. ②대법관은 대법원장의 제청으로 국회의 동의를 얻어 대통령이 임명한다. ③대법원장과 대법관이 아닌 법관은 대법관회의의 동의를 얻어 대법원장이 임명한다.", "section": null}, {"type": "article", "id": "105", "title": "제105조", "text": "①대법원장의 임기는 6년으로 하며, 중임할 수 없다. ②대법관의 임기는 6년으로 하며, 법률이 정하는 바에 의하여 연임할 수 있다. ③대법원장과 대법관이 아닌 법관의 임기는 10년으로 하며, 법률이 정하는 바에 의하여 연임할 수 있다. ④법관의 정년은 법률로 정한다.", "section": null}, {"type": "article", "id": "106", "title": "제106조", "text": "①법관은 탄핵 또는 금고이상의 형의 선고에 의하지 아니하고는 파면되지 아니하며, 징계처분에 의 하지 아니하고는 정직·감봉 기타 불리한 처분을 받지 아니한다. ②법관이 중대한 심신상의 장해로 직무를 수행할 수 없을 때에는 법률이 정하는 바에 의하여 퇴직하게 할 수 있다.", "section": null}, {"type": "article", "id": "107", "title": "제107조", "text": "①법률이 헌법에 위반되는 여부가 재판의 전제가 된 경우에는 법원은 헌법재판소에 제청하여 그 심 판에 의하여 재판한다. ②명령·규칙 또는 처분이 헌법이나 법률에 위반되는 여부가 재판의 전제가 된 경우에는 대법원은 이를 최종적으로 심사할 권한을 가진다. ③재판의 전심절차로서 행정심판을 할 수 있다. 행정심판의 절차는 법률로 정하되, 사법절차가 준용되어야 한다.", "section": null}, {"type": "article", "id": "108", "title": "제108조", "text": "대법원은 법률에서 저촉되지 아니하는 범위안에서 소송에 관한 절차, 법원의 내부규율과 사무처리 에 관한 규칙을 제정할 수 있다.", "section": null}, {"type": "article", "id": "109", "title": "제109조", "text": "재판의 심리와 판결은 공개한다. 다만, 심리는 국가의 안전보장 또는 안녕질서를 방해하거나 선량 한 풍속을 해할 염려가 있을 때에는 법원의 결정으로 공개하지 아니할 수 있다.", "section": null}, {"type": "article", "id": "110", "title": "제110조", "text": "①군사재판을 관할하기 위하여 특별법원으로서 군사법원을 둘 수 있다. ②군사법원의 상고심은 대법원에서 관할한다. ③군사법원의 조직·권한 및 재판관의 자격은 법률로 정한다. ④비상계엄하의 군사재판은 군인·군무원의 범죄나 군사에 관한 간첩죄의 경우와 초병·초소·유독음식물공급·포로에 관한 죄중 법률이 정한 경우에 한하여 단심으로 할 수 있다. 다만, 사형을 선고한 경우에는 그러하지 아니하다.", "section": null}, {"type": "chapter", "text": "제6장 헌법재판소", "id": "ch6"}, {"type": "article", "id": "111", "title": "제111조", "text": "①헌법재판소는 다음 사항을 관장한다. 1. 법원의 제청에 의한 법률의 위헌여부 심판 2. 탄핵의 심판 3. 정당의 해산 심판 4. 국가기관 상호간, 국가기관과 지방자치단체간 및 지방자치단체 상호간의 권한쟁의에 관한 심판 5. 법률이 정하는 헌법소원에 관한 심판 ②헌법재판소는 법관의 자격을 가진 9인의 재판관으로 구성하며, 재판관은 대통령이 임명한다. ③제2항의 재판관중 3인은 국회에서 선출하는 자를, 3인은 대법원장이 지명하는 자를 임명한다. ④헌법재판소의 장은 국회의 동의를 얻어 재판관중에서 대통령이 임명한다.", "section": null}, {"type": "article", "id": "112", "title": "제112조", "text": "①헌법재판소 재판관의 임기는 6년으로 하며, 법률이 정하는 바에 의하여 연임할 수 있다. ②헌법재판소 재판관은 정당에 가입하거나 정치에 관여할 수 없다. ③헌법재판소 재판관은 탄핵 또는 금고이상의 형의 선고에 의하지 아니하고는 파면되지 아니한다.", "section": null}, {"type": "article", "id": "113", "title": "제113조", "text": "①헌법재판소에서 법률의 위헌결정, 탄핵의 결정, 정당해산의 결정 또는 헌법소원에 관한 인용결정 을 할 때에는 재판관 6인이상의 찬성이 있어야 한다. ②헌법재판소는 법률에 저촉되지 아니하는 범위안에서 심판에 관한 절차, 내부규율과 사무처리에 관한 규칙을 제정할 수 있다. ③헌법재판소의 조직과 운영 기타 필요한 사항은 법률로 정한다.", "section": null}, {"type": "chapter", "text": "제7장 선거관리", "id": "ch7"}, {"type": "article", "id": "114", "title": "제114조", "text": "①선거와 국민투표의 공정한 관리 및 정당에 관한 사무를 처리하기 위하여 선거관리위원회를 둔다. ②중앙선거관리위원회는 대통령이 임명하는 3인, 국회에서 선출하는 3인과 대법원장이 지명하는 3인의 위원으로 구성한다. 위원장은 위원중에서 호선한다. ③위원의 임기는 6년으로 한다. ④위원은 정당에 가입하거나 정치에 관여할 수 없다. ⑤위원은 탄핵 또는 금고이상의 형의 선고에 의하지 아니하고는 파면되지 아니한다. ⑥중앙선거관리위원회는 법령의 범위안에서 선거관리·국민투표관리 또는 정당사무에 관한 규칙을 제정할 수 있으며, 법률에 저촉되지 아니하는 범위안에서 내부규율에 관한 규칙을 제정할 수 있다. ⑦각급 선거관리위원회의 조직·직무범위 기타 필요한 사항은 법률로 정한다.", "section": null}, {"type": "article", "id": "115", "title": "제115조", "text": "①각급 선거관리위원회는 선거인명부의 작성등 선거사무와 국민투표사무에 관하여 관계 행정기관 에 필요한 지시를 할 수 있다. ②제1항의 지시를 받은 당해 행정기관은 이에 응하여야 한다.", "section": null}, {"type": "article", "id": "116", "title": "제116조", "text": "①선거운동은 각급 선거관리위원회의 관리하에 법률이 정하는 범위안에서 하되, 균등한 기회가 보 장되어야 한다. ②선거에 관한 경비는 법률이 정하는 경우를 제외하고는 정당 또는 후보자에게 부담시킬 수 없다.", "section": null}, {"type": "chapter", "text": "제8장 지방자치", "id": "ch8"}, {"type": "article", "id": "117", "title": "제117조", "text": "①지방자치단체는 주민의 복리에 관한 사무를 처리하고 재산을 관리하며, 법령의 범위안에서 자치 에 관한 규정을 제정할 수 있다. ②지방자치단체의 종류는 법률로 정한다.", "section": null}, {"type": "article", "id": "118", "title": "제118조", "text": "①지방자치단체에 의회를 둔다. ②지방의회의 조직·권한·의원선거와 지방자치단체의 장의 선임방법 기타 지방자치단체의 조직과 운영에 관한 사항은 법률로 정한다.", "section": null}, {"type": "chapter", "text": "제9장 경제", "id": "ch9"}, {"type": "article", "id": "119", "title": "제119조", "text": "①대한민국의 경제질서는 개인과 기업의 경제상의 자유와 창의를 존중함을 기본으로 한다. ②국가는 균형있는 국민경제의 성장 및 안정과 적정한 소득의 분배를 유지하고, 시장의 지배와 경제력의 남용을 방지하며, 경제주체간의 조화를 통한 경제의 민주화를 위하여 경제에 관한 규제와 조정을 할 수 있다.", "section": null}, {"type": "article", "id": "120", "title": "제120조", "text": "①광물 기타 중요한 지하자원·수산자원·수력과 경제상 이용할 수 있는 자연력은 법률이 정하는 바 에 의하여 일정한 기간 그 채취·개발 또는 이용을 특허할 수 있다. ②국토와 자원은 국가의 보호를 받으며, 국가는 그 균형있는 개발과 이용을 위하여 필요한 계획을 수립한다.", "section": null}, {"type": "article", "id": "121", "title": "제121조", "text": "①국가는 농지에 관하여 경자유전의 원칙이 달성될 수 있도록 노력하여야 하며, 농지의 소작제도는 금지된다. ②농업생산성의 제고와 농지의 합리적인 이용을 위하거나 불가피한 사정으로 발생하는 농지의 임대차와 위탁경영은 법률이 정하는 바에 의하여 인정된다.", "section": null}, {"type": "article", "id": "122", "title": "제122조", "text": "국가는 국민 모두의 생산 및 생활의 기반이 되는 국토의 효율적이고 균형있는 이용·개발과 보전을 위하여 법률이 정하는 바에 의하여 그에 관한 필요한 제한과 의무를 과할 수 있다.", "section": null}, {"type": "article", "id": "123", "title": "제123조", "text": "①국가는 농업 및 어업을 보호·육성하기 위하여 농·어촌종합개발과 그 지원등 필요한 계획을 수립· 시행하여야 한다. ②국가는 지역간의 균형있는 발전을 위하여 지역경제를 육성할 의무를 진다. ③국가는 중소기업을 보호·육성하여야 한다. ④국가는 농수산물의 수급균형과 유통구조의 개선에 노력하여 가격안정을 도모함으로써 농·어민의 이익을 보호한다. ⑤국가는 농·어민과 중소기업의 자조조직을 육성하여야 하며, 그 자율적 활동과 발전을 보장한다.", "section": null}, {"type": "article", "id": "124", "title": "제124조", "text": "국가는 건전한 소비행위를 계도하고 생산품의 품질향상을 촉구하기 위한 소비자보호운동을 법률이 정하는 바에 의하여 보장한다.", "section": null}, {"type": "article", "id": "125", "title": "제125조", "text": "국가는 대외무역을 육성하며, 이를 규제·조정할 수 있다.", "section": null}, {"type": "article", "id": "126", "title": "제126조", "text": "국방상 또는 국민경제상 긴절한 필요로 인하여 법률이 정하는 경우를 제외하고는, 사영기업을 국유 또는 공유로 이전하거나 그 경영을 통제 또는 관리할 수 없다.", "section": null}, {"type": "article", "id": "127", "title": "제127조", "text": "①국가는 과학기술의 혁신과 정보 및 인력의 개발을 통하여 국민경제의 발전에 노력하여야 한다. ②국가는 국가표준제도를 확립한다. ③대통령은 제1항의 목적을 달성하기 위하여 필요한 자문기구를 둘 수 있다.", "section": null}, {"type": "chapter", "text": "제10장 헌법개정", "id": "ch10"}, {"type": "article", "id": "128", "title": "제128조", "text": "①헌법개정은 국회재적의원 과반수 또는 대통령의 발의로 제안된다. ②대통령의 임기연장 또는 중임변경을 위한 헌법개정은 그 헌법개정 제안 당시의 대통령에 대하여는 효력이 없다.", "section": null}, {"type": "article", "id": "129", "title": "제129조", "text": "제안된 헌법개정안은 대통령이 20일이상의 기간 이를 공고하여야 한다.", "section": null}, {"type": "article", "id": "130", "title": "제130조", "text": "①국회는 헌법개정안이 공고된 날로부터 60일이내에 의결하여야 하며, 국회의 의결은 재적의원 3분의 2이상의 찬성을 얻어야 한다. ②헌법개정안은 국회가 의결한 후 30일이내에 국민투표에 붙여 국회의원선거권자 과반수의 투표와 투표자 과반수의 찬성을 얻어야 한다. ③헌법개정안이 제2항의 찬성을 얻은 때에는 헌법개정은 확정되며, 대통령은 즉시 이를 공포하여야 한다.", "section": null}];
const DICT         = {"1": [{"word": "민주공화국", "desc": "주권이 국민에게 있어 국민을 위해 국가 권력이 행사되는 '민주주의'와, 군주제 없이 국민의 대표를 통해 국정이 운영되는 '공화주의'가 결합된 국가 형태를 뜻"}, {"word": "주권", "desc": "대내적으로는 국가의 의사를 최종적으로 결정할 수 있는 최고의 권력을 뜻하며, 대외적으로는 다른 나라의 간섭을 받지 않는 독립된 권력을 의미"}, {"word": "국민주권", "desc": "국가의 운명을 결정하는 최고 권력인 '주권'이 소수의 특권층이나 군주가 아니라, 국가의 주인인 국민 전체에게 있다는 우리 헌법의 핵심 원리", "anchor": "주권은 국민에게"}, {"word": "권력", "desc": "헌법 제1조에서 \"모든 권력은 국민으로부터 나온다\"고 할 때의 권력으로, 주권자인 국민으로부터 위임받아 현실적으로 국가를 다스리고 법을 강제할 수 있는 구체적인 힘(통치권)을 의미"}], "2": [{"word": "국민", "desc": "대한민국의 국적을 취득하고 보유하여 국가의 인적 구성원이 된 자연인을 말합니다. 헌법의 위임을 받아 국민이 되는 구체적인 요건(국적 취득 요건)은 「국적법」이라는 법률로 정함"}, {"word": "재외국민", "desc": "대한민국의 국적을 유지한 채 외국의 영주권을 취득하거나 장기간 외국에 체류하며 거주하는 사람을 뜻합니다. 이들도 대한민국 헌법의 적용을 받는 국민이므로, 국가는 법률이 정하는 바에 따라 이들을 보호할 헌법상 의무를 짐."}], "4": [{"word": "자유민주적 기본질서", "desc": "개인의 자유와 인권을 존중하고 독재 등 폭력적 지배를 배제하며, 권력분립·의회제도·복수정당제 등을 바탕으로 운영되는 민주적이고 법치주의적인 통치 질서"}, {"word": "평화적 통일", "desc": "무력이나 전쟁을 사용하지 않고, 자유민주적 기본질서에 입각하여 남북한 간의 대화와 교류 등 평화적인 방법으로 이루어내는 통일 방식"}], "5": [{"word": "국제평화", "desc": "대한민국이 국제사회에서 무력 충돌을 방지하고 다른 나라들과의 평화 및 공존을 지향하며, 항구적인 세계 평화 유지에 기여하겠다는 헌법적 선언"}, {"word": "침략적 전쟁", "desc": "영토 확장이나 자국의 이익을 얻기 위해 다른 나라를 선제적으로 공격하는 전쟁을 말하며, 헌법은 외부 공격을 막기 위한 '자위(방어) 전쟁'과 구별하여 이를 엄격히 금지함"}], "6": [{"word": "외국인", "desc": "대한민국의 국적을 가지지 않은 타국적자나 무국적자를 모두 포함하여 일컫는 말입니다. 헌법 제6조 제2항에 따라 국제법과 조약에 의해 그 지위가 보장되며, 참정권 같은 '국민의 권리'는 제한되지만 인간의 존엄성 등 '인간의 권리'에 대해서는 기본권의 주체가 될 수 있음."}, {"word": "조약", "desc": "국가나 국제기구 등 국제법 주체들 간에 법적인 권리와 의무를 발생시키거나 변경, 소멸시키기 위해 체결한 합의를 말합니다. 협정, 협약, 헌장, 의정서 등 명칭에 상관없이 그 실질에 따라 결정되며, 헌법상 절차를 거쳐 체결·공포되면 국내법과 같은 효력을 갖습"}, {"word": "국제법규", "desc": "우리나라의 가입이나 비준 여부와 상관없이, 국제사회의 대다수 국가에 의해 보편타당한 규범으로 승인되어 효력이 인정되는 국제관습법이나 국제조약을 말합니다. 이는 별도의 국내법적 수용 절차 없이도 당연히 국내법과 같은 효력을 가짐."}, {"word": "국내법", "desc": "대한민국이라는 국가의 주권이 미치는 영역 내에서 제정되고 적용되는 법체계로서, 헌법, 법률, 명령, 조례 등의 다양한 법규범을 포괄하는 개념입니다. 헌법에 따라 체결된 조약과 국제법규는 이 국내법(법률 또는 명령) 중 어느 하나와 동등한 지위를 부여받아 적용됨."}, {"word": "효력", "desc": "특정 법규범이 법체계 내에서 유효한 것으로 인정되어, 권리를 보장하거나 의무를 부과하며 실제로 강제 집행될 수 있는 규범적인 힘을 의미합니다. 조약이 \"국내법과 같은 효력을 가진다\"는 것은 조약이 국제사회를 넘어 우리나라 내부에서도 법원과 국가기관을 구속하는 법적 힘을 발휘한다는 뜻"}], "7": [{"word": "정치적 중립성", "desc": "공무원이나 국군 등이 특정 정당이나 집권 세력의 이익에 치우치지 않고, 국민 전체를 위한 봉사자로서 부당한 지시에 흔들림 없이 공정하게 직무를 수행해야 한다는 원칙"}, {"word": "공무원", "desc": "국가나 공공단체와 공법상의 근무관계를 맺고 공공적 업무를 담당하며, 직·간접적으로 선출되거나 임용되는 사람"}, {"word": "국민전체에 대한 봉사자", "desc": "공무원이 특정 정당이나 계층, 개인의 사익이 아니라 전체 국민의 이익과 자유, 권리 보장을 위해 공정하게 직무를 수행해야 하는 지위에 있음"}, {"word": "책임", "desc": "주권자인 국민으로부터 위임받은 권한을 자의적으로 행사해서는 안 되며, 직무 수행 과정에서 위법행위나 잘못이 있을 경우 징계나 형사처벌 등 실질적인 법적 제재를 받는 근본적인 책임을 의미"}], "8": [{"word": "정당", "desc": "국민의 다원적 정치 의사를 결집하여 책임 있는 주장과 정책을 추진하고, 공직선거에 후보자를 추천하여 국가 권력에 참여함을 목적으로 하는 자발적인 정치 결사체"}, {"word": "복수정당제", "desc": "다양한 국민의 의사를 반영하기 위해 두 개 이상의 정당이 존재하고 자유롭게 경쟁할 수 있도록 보장하여 다원주의와 정치과정의 개방성을 실현하는 민주주의의 핵심 제도"}, {"word": "정치적 의사형성", "desc": "무정형적이고 개별적인 국민의 다양한 정치적 입장과 이익을 선별, 조정, 결집하여 국가 정책이나 결정에 영향을 미칠 수 있는 구체적인 여론과 의사로 만들어가는 과정"}, {"word": "정당해산", "desc": "정당의 목적이나 활동이 헌법상 민주적 기본질서에 실질적인 해악을 끼칠 구체적 위험이 있을 때, 민주주의 체제를 수호하기 위해 헌법재판소의 심판을 거쳐 해당 정당을 강제로 소멸시키는 제도", "anchor": "해산"}, {"word": "헌법재판소", "desc": "정당해산심판을 비롯해 위헌법률심판, 헌법소원, 탄핵 등을 관장하며, 국가권력의 남용을 통제하고 헌법과 국민의 기본권을 수호하는 최고 헌법재판기관"}], "10": [{"word": "인간의 존엄과 가치", "desc": "인간을 어떠한 목적을 위한 수단으로 취급해서는 안 되며, 자율성과 이성을 가진 인격적 존재로서 그 자체로 존중받아야 한다는 우리 헌법의 최고 가치이자 기본원리", "anchor": "인간으로서의 존엄과 가치"}, {"word": "행복추구권", "desc": "국민이 각자 자신이 생각하는 행복을 추구하기 위해, 국가의 부당한 간섭 없이 자율적으로 생활을 형성하고 자유롭게 행동할 수 있는 권리", "anchor": "행복을 추구할 권리"}, {"word": "기본적 인권", "desc": "실정법으로 정해지기 이전부터 인간이라는 이유만으로 당연히 가지는 보편적인 천부인권(자연권)을 국가의 헌법 규범으로 확인하여 실정화한 권리를 뜻"}, {"word": "불가침", "desc": "기본권이 인간 고유의 자연권적 성질을 가지기 때문에, 국가 권력이나 타인의 일방적인 의사에 의해 부당하게 침해되거나 변경, 박탈될 수 없다는 확고한 성질을 의미"}], "11": [{"word": "차별", "desc": "성별, 종교, 사회적 신분 등을 이유로 본질적으로 동일한 비교 집단을 합리적이고 객관적인 정당한 사유 없이 서로 다르게 대우하여 불이익을 주는 행위"}, {"word": "사회적 신분", "desc": "출생에 의해 생래적으로 부여되는 가문이나 인종 같은 선천적 지위뿐만 아니라, 전과자 등과 같이 사회에서 장기간 점유하며 일정한 사회적 평가를 수반하게 되는 후천적 지위까지 모두 포함하는 개념"}, {"word": "특수계급", "desc": "특정 사람이나 집단에게 다른 구성원보다 특별한 신분이나 특권을 부여하여 사회 구성원을 상하 위계로 나누는 제도로서, 우리 헌법은 과거의 봉건적 악폐를 막기 위해 이를 철저히 금지함"}, {"word": "영전", "desc": "국가에 공헌한 사람에게 수여하는 훈장이나 포장 등 국가적 명예를 뜻하며, 헌법은 이러한 혜택이 세습되어 새로운 특권 계급이 발생하는 것을 막기 위해 오직 받은 사람 당대에게만 효력이 미치도록 제한함"}], "12": [{"word": "적법절차", "desc": "국가가 국민의 권리를 제한할 때 단순히 법률이 정한 절차를 따르는 것을 넘어, 그 법률의 실체적 내용과 절차 모두가 합리적이고 정당해야 한다는 원칙", "anchor": "적법한 절차"}, {"word": "보안처분", "desc": "범죄자의 재범을 막고 사회로의 복귀를 도우며 사회를 방위하기 위해, 형벌을 대신하거나 보완하여 강제적으로 부과하는 치료나 개선 조치"}, {"word": "강제노역", "desc": "개인의 자유로운 의사에 반하여 국가 등에 의해 강제로 육체적 활동이나 노동을 하도록 요구받는 것을 뜻"}, {"word": "영장주의", "desc": "수사기관이 국민을 체포, 구속, 압수, 수색할 때 공권력 남용을 막기 위해 반드시 독립된 법관이 사전에 발부한 영장을 제시해야 한다는 원칙", "anchor": "영장"}, {"word": "현행범", "desc": "범죄를 실행하고 있거나 실행을 막 끝낸 범인을 뜻하며, 상황이 긴박하므로 예외적으로 법관의 사전 영장 없이도 체포할 수 있음."}], "13": [{"word": "소급입법", "desc": "이미 과거에 끝난 행동에 대하여 사후에 새로운 법률을 만들어 과거로 거슬러 올라가 불리하게 적용하고 처벌하는 입법을 말하며, 헌법은 형벌불소급원칙을 통해 이를 엄격히 금지"}, {"word": "이중처벌금지", "desc": "하나의 동일한 범죄 행위에 대하여 국가가 두 번 이상 거듭해서 형사 처벌(형벌)을 내릴 수 없다는 원칙으로, 일사부재리의 원칙이라고도 부릅", "anchor": "거듭 처벌받지 아니한다"}], "14": [{"word": "거주·이전의 자유", "desc": "국가권력의 간섭을 받지 않고 일상생활 및 경제활동의 근거지가 되는 장소인 주소, 거소 등을 설정하고 이전하며, 일단 정한 장소를 자신의 의사에 반하여 강제로 옮기지 아니할 자유를 의미"}], "15": [{"word": "직업선택의 자유", "desc": "자신이 원하는 직업을 자유롭게 선택하는 좁은 의미의 ‘직업선택의 자유’와, 선택한 직업을 자기가 원하는 방식으로 자유롭게 수행할 수 있는 ‘직업수행의 자유’를 모두 포함하는 포괄적인 자유를 뜻"}], "16": [{"word": "주거의 자유", "desc": "개방되지 않은 사적 공간인 주거를 공권력이나 제3자에 의해 침해당하지 않고, 인격 발현과 자주적인 생활 형성을 위해 안전과 평온한 상태를 누릴 수 있는 자유"}], "17": [{"word": "사생활의 비밀", "desc": "개인의 내밀한 사적 영역이 외부로부터 함부로 조사되거나 들여다보이지 않고, 본인의 의사에 반하여 타인에게 그 사적인 내용이 알려지거나 공개되지 아니할 권리를 뜻"}], "18": [{"word": "통신의 비밀", "desc": "우편, 전화, 이메일 등 통신수단을 이용하여 당사자 간에 주고받는 의사표현이나 정보가 통신인의 의사에 반하여 타인에게 개봉, 감청, 열람, 누설되지 않고 그 비밀을 보호받을 권리"}], "19": [{"word": "양심의 자유", "desc": "무엇이 옳고 그른지에 대하여 자신의 인격적 존재가치를 걸고 판단하는 내심의 확신(양심)을 외적 간섭 없이 자유롭게 형성하고, 그 양심에 반하는 행동을 강요당하지 않으며 양심에 따라 행동할 수 있는 자유"}], "20": [{"word": "종교의 자유", "desc": "초자연적·초인간적 존재에 대하여 이를 경외하고 믿는 주관적인 확신인 신앙의 자유와, 이를 바탕으로 예배·의식 등을 행하거나 선교할 수 있는 종교적 행위 및 집회·결사의 자유를 포괄하는 권리"}, {"word": "정교분리", "desc": "국가는 특정한 종교를 국교로 인정하지 않으며, 국가 권력이 종교적으로 엄격한 중립을 지키고 개인의 종교적 신념에 부당하게 개입하거나 특정 종교를 우대·차별해서는 안 된다는 헌법적 원칙", "anchor": "분리된다"}], "21": [{"word": "언론·출판의 자유", "desc": "자신의 사상이나 의견을 언어, 문자, 영상 등 다양한 매체를 통해 불특정 다수인에게 자유롭게 표명하고 전달하는 의사표현의 자유로서, 국민의 알 권리와 보도의 자유 등을 포괄하는 권리"}, {"word": "집회·결사의 자유", "desc": "다수인이 일정한 장소에 공동목적을 가지고 평화적으로 모이는 '집회의 자유'와, 다수의 사람이 공동목적을 위해 상당한 기간 지속적으로 결합하는 단체를 구성하고 활동할 '결사의 자유'를 총칭하는 집단적 표현의 기본권"}], "22": [{"word": "학문의 자유", "desc": "일정한 지식수준을 기반으로 방법론적으로 비판적인 성찰을 통해 진리를 탐구하는 활동의 자유로서, 연구의 자유뿐만 아니라 그 결과를 발표하고 대학 등에서 가르치는 교수의 자유 및 대학의 자율성을 포함", "anchor": "학문과 예술의 자유"}, {"word": "예술의 자유", "desc": "창작소재·창작형태 및 창작과정 등에 대한 임의로운 결정권을 포함하는 '예술창작의 자유'와, 그 창작물을 외부에 발표하는 '예술표현의 자유', 그리고 예술적 목적의 집회 및 결사의 자유를 포괄하는 권리"}], "23": [{"word": "공공복리", "desc": "국가와 사회의 구성원 모두의 공익과 행복을 뜻하며, 공동체 구성원 전체를 위한 공동의 이익을 의미"}, {"word": "공공필요", "desc": "국민의 재산권을 그 의사에 반하여 강제적으로라도 취득해야 할 공익적 필요성을 뜻하며, 추상적인 공익 일반 이상의 중대한 '공익성'과 강제 취득의 '필요성'으로 구성됨."}, {"word": "수용", "desc": "국가나 사업주체가 공공필요를 위하여 재산권의 전부 또는 일부를 강제적으로 박탈하거나 소유권을 강제적으로 이전시키는 것"}, {"word": "사용", "desc": "소유권의 변동(이전)은 없는 상태에서 당해 재산권의 효용성을 강제적으로 활용하거나, 재산에 대한 사용권을 일시적으로 배제하는 것을 의미"}, {"word": "제한", "desc": "소유자가 재산권을 사용·수익·처분하려는 행위, 즉 소유권의 권능을 행사하려는 행위에 공법상의 제약을 가하는 것"}, {"word": "정당한 보상", "desc": "원칙적으로 공용수용 등으로 침해된 피수용재산의 객관적인 재산가치를 완전하게 보상해 주는 완전보상을 뜻"}], "24": [{"word": "선거권", "desc": "대의제도를 작동시키는 데 필수적인 요소로서, 선거에 참여하여 자신이 원하는 정책결정권자(국민의 대표자)를 선정하고 투표할 수 있는 권리"}], "25": [{"word": "공무담임권", "desc": "선거를 통해 선출되는 직위(피선거권)뿐만 아니라 임용시험 등을 통하여 국가나 공공단체의 공무를 맡아 수행할 수 있는 포괄적인 공직 취임 권리"}], "26": [{"word": "청원권", "desc": "모든 국민이 법률이 정하는 바에 의하여 국가기관에 문서로써 불만이나 희망 등 의견을 진술하고 국가기관에 그에 대한 심사를 요구할 수 있는 권리", "anchor": "청원할 권리"}, {"word": "국가기관", "desc": "입법부(국회), 행정부(정부), 사법부(법원) 등과 같이 헌법과 법률에 의하여 설치되어 국가의 권력이나 공적인 업무를 나누어 행사하는 기관"}], "27": [{"word": "무죄추정", "desc": "범죄 혐의로 수사나 재판을 받는 사람이라도 법원의 유죄 판결이 최종적으로 확정되기 전까지는 원칙적으로 죄가 없는 사람으로 대우해야 한다는 원칙", "anchor": "무죄로 추정된다"}, {"word": "재판청구권", "desc": "자신의 기본권을 침해당하였거나 기본권을 보호받지 못한 사람, 또는 기본권 침해를 예방하고자 하는 사람이 재판절차를 통해 적절한 구제의 판결을 구할 수 있는 권리", "anchor": "재판을 받을 권리"}, {"word": "공개재판", "desc": "재판의 공정을 보장하기 위하여 밀실이나 비공개 재판을 배제하고, 일반 국민의 감시 하에 재판의 심리와 판결을 받을 권리를 뜻"}, {"word": "형사피해자", "desc": "형사실체법상의 보호법익을 기준으로 한 직접적인 피해자 개념에 한정되지 아니하고, 당해 범죄행위로 말미암아 법률상 불이익을 받게 된 자까지 모두 포함하는 넓은 의미의 주체"}], "28": [{"word": "형사보상", "desc": "국가가 무죄인 사람을 범죄피의자로 다루었거나 범죄자로 판단하여 구금 등 형벌을 가함으로써, 그 사람에게 발생한 물질적·정신적 손실을 국가가 회복(전보)해 줄 것을 요구할 수 있는 청구권", "anchor": "정당한 보상을 청구"}], "29": [{"word": "국가배상", "desc": "국가에 소속된 공무원이 직무를 수행함에 있어서 위법하게 타인(국민)에게 손해를 발생시킨 경우에, 가해 공무원 개인이 아니라 국가가 대신 손해를 물어주는 법적 책임을 지는 제도를 의미", "anchor": "정당한 배상을 청구"}, {"word": "공공단체", "desc": "국가와 함께 국가배상책임의 주체로서 헌법에 명시되어 있으며, 이를 구체화한 현행 국가배상법은 공공단체 중 '지방자치단체'만을 배상책임의 주체로 설정함"}], "30": [{"word": "범죄피해자 구조", "desc": "타인의 범죄행위로 인해 생명이나 신체에 피해를 입은 국민이나 유족이 가해자로부터 충분한 배상을 받지 못하여 생활에 어려움이 있을 때, 국가가 개입하여 대신 구조금 등을 지원해 주는 사회보장적 성격의 권리", "anchor": "구조를 받을 수 있다"}], "31": [{"word": "교육을 받을 권리", "desc": "지식을 습득하게 하고 인성을 발달시키는 교육을 받을 수 있도록 국가에 요구할 수 있는 권리로서, 국민이 능력에 따라 균등하게 교육받을 수 있도록 국가가 적극적으로 배려해 줄 것을 청구할 수 있는 권리"}, {"word": "의무교육", "desc": "모든 국민이 그 보호하는 자녀에게 적어도 초등교육과 법률이 정하는 기초 교육을 받게 할 의무를 지는 제도이며, 이러한 헌법상 의무교육은 무상으로 하는 것을 원칙으로 함"}, {"word": "교육의 자주성", "desc": "교육이 정치적 권력 등 외부 세력의 부당한 간섭을 받지 않고 자율적으로 이루어져야 함을 뜻하며, 헌법이 보장하고 있는 학문의 자유를 지키기 위한 확실한 보장 수단"}, {"word": "대학의 자율성", "desc": "대학 구성원들이 학문의 연구와 교육이라는 대학 본연의 기능을 달성하는 데 필요한 제반 사항들을 자주적으로 결정할 수 있는 권리"}], "32": [{"word": "근로의 권리", "desc": "모든 국민이 자신의 의사와 능력에 따라 근로관계를 형성하며, 국가에 대하여 사회적·경제적 방법으로 고용 증진과 적정임금의 보장 등 근로의 기회를 제공해 줄 것을 요구할 수 있는 권리"}, {"word": "최저임금제", "desc": "근로자의 근로 권리와 최저생활을 보장하기 위하여, 국가는 법률이 정하는 바에 따라 근로자 임금의 최저 기준을 정하고 이를 시행하여야 할 의무를 가짐."}, {"word": "근로조건", "desc": "임금, 근로시간 등 근로자가 노동을 제공하는 환경과 대우를 의미하며, 헌법은 이러한 근로조건의 기준을 인간의 존엄성을 보장하도록 법률로 정해야 한다고 명시함"}], "33": [{"word": "단결권", "desc": "근로자가 근로조건의 향상과 권익 보호를 위하여 자주적으로 노동조합과 같은 단체를 결성하고 가입할 수 있는 권리"}, {"word": "단체교섭권", "desc": "근로자가 결성한 단체(노동조합)가 근로조건의 향상을 위하여 사용자와 자주적으로 교섭하고 단체협약을 체결할 수 있는 권리"}, {"word": "단체행동권", "desc": "근로자가 근로조건의 향상을 위하여 사용자에 대항하여 파업이나 태업 등의 실력행사(쟁의행위)를 할 수 있는 권리"}], "34": [{"word": "인간다운 생활", "desc": "인간 존엄성에 적합하도록 경제적·사회적·문화적으로 기본적인 생활수준을 유지하는 데 필요한 사실적·물적 토대의 급부를 국가에 청구할 수 있는 권리"}, {"word": "사회보장", "desc": "출산, 양육, 실업, 노령, 장애, 질병, 빈곤 및 사망 등의 사회적 위험으로부터 모든 국민을 보호하고 국민 삶의 질을 향상시키는 데 필요한 소득 및 서비스를 보장하는 제도"}, {"word": "사회복지", "desc": "국가와 지방자치단체가 도움이 필요한 국민에게 보건의료, 교육, 주거, 고용 등 다방면에서 인간다운 생활을 보장하고 자립을 지원하기 위해 노력해야 할 헌법상 의무이자 제도"}], "35": [{"word": "환경권", "desc": "모든 국민이 건강하고 쾌적한 자연환경 및 인공환경에서 생활할 권리로서, 타인의 침해를 막는 자유권적 측면과 국가에 적극적 보호를 요구하는 사회권적 측면을 모두 가짐."}], "36": [{"word": "혼인과 가족생활", "desc": "개인의 존엄과 양성의 평등을 기초로 성립되고 유지되어야 하는 제도로서, 국가는 이를 보장하고 적극적으로 보호할 의무를 진다는 헌법적 선언"}, {"word": "모성보호", "desc": "출산은 혼인 및 가족생활의 중요한 부분을 이루므로, 국가는 임신과 출산을 희망하는 여성 및 가족을 적극적으로 보호하고 배려하는 정책을 실시해야 한다는 원칙", "anchor": "모성의 보호"}], "37": [{"word": "국가안전보장", "desc": "국가의 존립과 안전을 내·외부적으로 보장하는 것으로서, 구체적으로는 국가의 독립, 영토의 보전, 헌법과 법률의 기능 및 국가기관의 유지 등을 포괄하는 개념"}, {"word": "본질적 내용", "desc": "만약 이를 제한할 경우 기본권 그 자체가 무의미해지거나 유명무실해져서, 헌법이 당해 기본권을 보장하는 궁극적인 목적을 달성할 수 없게 만드는 핵심적이고 근본적인 요소를 뜻", "anchor": "본질적인 내용"}, {"word": "과잉금지원칙", "desc": "국가가 국민의 기본권을 제한하는 입법을 할 때 준수해야 할 한계로서, 입법이 목적의 정당성, 수단의 적합성, 피해의 최소성, 법익의 균형성이라는 4가지 하위원칙을 모두 갖추어야 한다는 헌법상 원칙", "anchor": "필요한 경우에 한하여"}, {"word": "비례원칙", "desc": "국가작용은 그 목적과 수단 사이에 합리적인 비례관계가 성립되어야 하고 필요한 최소한도에 그쳐야 한다는 원칙으로서, 자유권적 기본권을 제한하는 영역에서는 '과잉금지원칙'과 같은 의미로 불립", "anchor": "법률로써 제한"}], "44": [{"word": "불체포특권", "desc": "국회의원이 현행범인인 경우를 제외하고는 회기 중 국회의 동의 없이 체포 또는 구금되지 않으며, 회기 전에 체포된 경우에도 국회 요구 시 석방되어 국회의 정상적인 활동과 자율성을 보장받는 특권", "anchor": "체포 또는 구금되지 아니한다"}], "45": [{"word": "면책특권", "desc": "국회의원이 자유롭고 소신 있는 의사활동을 할 수 있도록, 국회에서 직무상 행한 발언과 표결에 대하여 국회 밖에서 민사상·형사상 등 일체의 법적 책임을 지지 않도록 보장하는 특권", "anchor": "책임을 지지 아니한다"}], "47": [{"word": "정기회", "desc": "법률이 정하는 바에 따라 매년 1회(9월 1일) 정기적으로 집회되어 예산안 심의·확정, 국정감사, 법률안 처리 등을 행하는 국회의 회기"}, {"word": "임시회", "desc": "대통령 또는 국회 재적의원 4분의 1 이상의 요구가 있을 때 집회되며, 의원과 정부가 제출한 법률안이나 당면한 국정 현안을 처리하기 위해 수시로 열리는 국회의 회기"}, {"word": "회기", "desc": "하나의 의회기(입법기) 내에서 국회가 한 번의 집회를 개회하여 안건을 처리하고 폐회할 때까지의 기간"}], "49": [{"word": "의결정족수", "desc": "일정한 의안에 대하여 가부(찬반)의 결정을 내리기 위해 참여해야 하는 최소한의 국회의원 수를 말하며, 원칙적으로 재적의원 과반수의 출석과 출석의원 과반수의 찬성을 요", "anchor": "재적의원 과반수"}, {"word": "재적의원", "desc": "현재 국회의원직을 유효하게 유지하고 있는 전체 의원을 뜻하며, 각종 의결과 발의에서 정족수를 산정하는 기준이 됨."}, {"word": "출석의원", "desc": "본회의나 위원회 등 해당 의사가 진행되는 회의장에 실제로 출석하여 의사결정(표결)에 참여하는 의원"}], "51": [{"word": "회기계속의 원칙", "desc": "국회에 제출된 법률안 기타 의안이 해당 회기 중에 처리되지 못하고 회기가 종료되더라도 바로 폐기되지 않고, 국회의원의 임기(입법기)가 만료되지 않는 한 다음 회기에서 계속 심의·처리할 수 있도록 하는 원칙", "anchor": "폐기되지 아니한다"}], "52": [{"word": "의안", "desc": "법률안, 예산안, 동의안 등 국회의 심의와 의결을 거치기 위해 본회의나 위원회에 정식으로 제출된 모든 안건을 통틀어 이르는 말", "anchor": "법률안을 제출"}, {"word": "법률안", "desc": "국회의원 10인 이상이나 위원회 또는 정부가 새로운 법률을 제정하거나 기존 법률을 개정하기 위해 국회에 제출하는 안건"}, {"word": "수정안", "desc": "본회의에 상정된 원래의 의안(원안)에 대하여 그 취지와 본질을 유지하면서 일부 내용을 삭제, 추가, 변경하기 위해 제출하는 안건", "anchor": null}], "53": [{"word": "재의요구", "desc": "국회에서 의결되어 정부로 이송된 법률안에 대하여 대통령이 이의가 있을 때, 해당 법률안을 국회로 돌려보내 다시 의결해 줄 것을 요구하는 권한(법률안 거부권)", "anchor": "재의를 요구"}], "54": [{"word": "예산안", "desc": "정부가 1년(회계연도) 동안 국가의 활동을 위하여 필요한 수입(세입)과 지출(세출) 내역을 미리 편성하여 국회의 심의와 확정을 받기 위해 제출하는 예정 준칙"}, {"word": "결산", "desc": "하나의 회계연도 동안 국가가 예산을 원래의 계획대로 적정하게 집행하였는지를 확인하기 위해, 확정된 수입과 지출의 실적을 사후적으로 심사하고 승인하는 절차", "anchor": null}], "61": [{"word": "국정감사", "desc": "국회가 국가기관의 적법하고 적정한 작용 수행 여부를 감시하기 위하여, 매년 정기적으로 소관 상임위원회별로 국정 전반에 관하여 포괄적으로 실시하는 조사 제도"}, {"word": "국정조사", "desc": "특정한 국정 사안에 의혹이나 문제가 발생했을 때 국회 재적의원 4분의 1 이상의 요구에 따라 특별위원회 또는 상임위원회가 부정기적이고 제한적으로 실시하는 조사 제도", "anchor": "조사할 수 있으며"}], "64": [{"word": "국회의 자율권", "desc": "국회가 국민의 대의기관으로서 다른 국가기관의 간섭을 받지 않고 독립적으로 내부 조직 구성, 의사절차(규칙 제정), 그리고 소속 의원의 신분 및 질서유지 등에 관한 사항을 스스로 결정할 수 있는 권한", "anchor": "내부규율에 관한 규칙"}], "65": [{"word": "탄핵소추", "desc": "일반 사법절차로 소추하기 곤란한 대통령, 법관 등 신분이 보장된 고위 공직자가 직무집행에 있어 헌법이나 법률을 위반한 경우, 국회가 적법한 절차에 따라 파면을 구하는 심판을 헌법재판소에 요구(의결)하는 제도"}], "66": [{"word": "국가원수", "desc": "대외적으로 외국에 대하여 국가를 대표하고, 대내적으로는 국가의 독립과 영토의 보전, 헌법 수호 등 국정의 최고 책임을 지는 대통령의 헌법상 지위", "anchor": "원수"}], "72": [{"word": "국민투표", "desc": "국가 안위에 관한 중요 정책을 결정하거나 헌법을 개정할 때, 주권자인 국민이 직접 투표를 통해 국가의사를 최종적으로 결정하는 헌법상의 직접민주제도"}], "76": [{"word": "긴급명령", "desc": "국가의 안위에 관계되는 중대한 교전상태에서 국회의 집회가 불가능할 때, 국가를 보위하기 위해 대통령이 발하는 법률과 동등한 효력을 가지는 비상적 명령", "anchor": "교전상태"}, {"word": "긴급재정경제명령", "desc": "중대한 재정·경제상의 위기 시에 국회의 집회를 기다릴 여유가 없을 때, 국가의 안전이나 공공의 안녕질서를 유지하기 위해 대통령이 발하는 법률과 동등한 효력을 가지는 명령", "anchor": "재정·경제상의 처분"}], "77": [{"word": "계엄", "desc": "전시나 사변 등 국가비상사태에 있어서 병력으로써 군사상의 필요에 응하거나 공공의 안녕질서를 유지하기 위해 대통령이 선포하는 비상조치로서, 일정한 지역의 행정권이나 사법권 등을 군대가 관장하도록 하는 권한"}], "79": [{"word": "사면", "desc": "국가원수인 대통령의 고유 권한으로서, 범죄를 저지른 자에 대하여 형 선고의 효력을 상실시키거나 공소권을 소멸시키고, 또는 형의 집행을 면제시켜 주는 조치"}, {"word": "감형", "desc": "법원이 선고한 형벌의 종류를 가벼운 것으로 변경하거나, 특정한 자에 대하여 형의 집행을 경감해 주는 대통령의 권한"}, {"word": "복권", "desc": "형의 선고로 인하여 법률상 상실되거나 정지된 자격을 대통령의 권한으로 다시 회복시켜 주는 조치"}], "82": [{"word": "부서", "desc": "대통령의 국법상 행위가 적법하게 이루어졌음을 확인하고, 그에 대한 국무총리와 관계 국무위원의 보좌 책임을 명확히 하기 위해 문서에 서명하는 제도"}], "88": [{"word": "국무회의", "desc": "대통령을 의장, 국무총리를 부의장으로 하여 정부의 권한에 속하는 중요한 정책을 심의하는 행정부 내의 최고 합의제 심의기관"}], "101": [{"word": "사법권", "desc": "구체적인 법적 분쟁(쟁송)이 발생한 경우, 독립적 지위를 가진 법관이 법을 해석하고 적용하여 유권적인 판단을 내림으로써 개인의 권리를 보호하고 법질서를 유지하는 국가권력(작용)"}, {"word": "법률심", "desc": "사실심에서 밝혀진 사실관계를 바탕으로, 법률을 올바르게 해석하고 적용하였는지만을 전문적으로 심사하여 결론을 내리는 재판 과정으로서 원칙적으로 최고법원인 대법원이 이를 관장", "anchor": "대법원"}, {"word": "사실심", "desc": "법정에서 증거조사 등을 통하여 재판의 바탕이 되는 구체적인 과거의 사실관계를 입증하고 확정하는 단계의 재판 과정", "anchor": "각급법원"}], "103": [{"word": "재판의 독립", "desc": "법관이 재판을 함에 있어서 오직 헌법과 법률에 의하여 그 양심에 따라 할 뿐, 다른 국가기관이나 사법부 내부, 외부의 어떠한 압력이나 간섭도 받지 않고 심판하는 것을 의미", "anchor": "독립하여 심판"}], "110": [{"word": "군사법원", "desc": "군인이나 군무원의 범죄, 또는 군사에 관한 특정 중대 범죄를 심판하기 위하여 헌법에 근거를 두고 예외적으로 설치된 특별법원"}, {"word": "특별법원", "desc": "일반법원과 조직·권한 및 재판관의 자격을 다르게 정하여, 군사재판과 같이 특수한 신분이나 사건만을 전문적으로 관할하도록 예외적으로 설치된 법원을 뜻"}], "111": [{"word": "위헌법률심판", "desc": "법원에서 재판 중인 구체적인 소송사건에 적용될 법률이 헌법에 위반되는지 여부가 재판의 전제가 된 경우, 법원의 제청에 따라 헌법재판소가 그 위헌 여부를 심판하여 효력을 상실하게 하는 제도", "anchor": "위헌여부 심판"}, {"word": "헌법소원", "desc": "공권력의 행사 또는 불행사로 인하여 헌법상 보장된 자신의 기본권을 직접 침해받은 국민이 헌법재판소에 당해 공권력의 위헌심사를 청구하여 기본권을 구제받는 제도"}, {"word": "권한쟁의심판", "desc": "국가기관 상호 간, 국가기관과 지방자치단체 간, 또는 지방자치단체 상호 간에 권한의 존부나 범위에 관하여 다툼이 발생했을 때, 헌법재판소가 이를 심판하여 국가기능의 원활한 수행을 도모하고 헌법질서를 수호하는 제도", "anchor": "권한쟁의에 관한 심판"}, {"word": "정당해산심판", "desc": "정당의 목적이나 활동이 민주적 기본질서에 위배될 때 정부가 헌법재판소에 제소하여, 그 심판 결과에 따라 위헌적인 정당을 강제로 해산시키는 방어적 민주주의 제도", "anchor": "정당의 해산 심판"}, {"word": "탄핵심판", "desc": "일반 사법절차로 소추하기 곤란한 대통령, 법관 등 신분이 보장된 고위 공직자가 직무집행에 있어 헌법이나 법률을 중대하게 위반한 경우, 국회의 소추에 따라 헌법재판소가 해당 공직자로부터 권한을 박탈(파면)하는 제도", "anchor": "탄핵의 심판"}], "114": [{"word": "중앙선거관리위원회", "desc": "선거와 국민투표의 공정한 관리 및 정당에 관한 사무를 처리하기 위하여, 대통령 임명 3인, 국회 선출 3인, 대법원장 지명 3인으로 구성되어 독립적으로 운영되는 합의제 헌법기관"}], "117": [{"word": "지방자치단체", "desc": "국가 내의 일정한 지역을 기초로 하고 그 지역의 주민을 구성원으로 하여, 국가로부터 부여된 지방행정을 스스로 담당하는 공법상의 단체"}, {"word": "자치권", "desc": "지방자치단체가 지역적 사무 전반에 걸쳐 자신의 책임 하에 스스로 이를 처리할 수 있는 포괄적인 권한으로서, 자치조직권, 자치입법권, 자치행정권, 자치재정권 등을 포함", "anchor": "법령의 범위안에서"}, {"word": "조례", "desc": "지방자치단체가 법령의 범위 안에서 그 고유의 사무에 관하여 지방의회의 의결을 거쳐 제정하는 자치적인 법규", "anchor": "규정을 제정할 수"}], "118": [{"word": "지방의회", "desc": "주민의 직선으로 선출되는 주민의 대의기관이자 의결기관으로서, 조례의 제정·개정 및 폐지와 예산의 심의·확정, 결산의 승인 등을 담당하는 지방자치단체의 필수적 기관"}], "119": [{"word": "경제민주화", "desc": "민주주의 원리를 정부의 세계에 국한하지 않고 생산과 산업 등 경제 영역에도 적용하여, 경제주체 간의 조화를 통해 시장 지배와 경제력 남용을 방지하고 경제적 정의를 실현하려는 국가의 지향 목표", "anchor": "경제의 민주화"}, {"word": "균형있는 국민경제", "desc": "부와 문화생활의 양극화 현상을 막고 빈곤한 계층에게도 경제적 기회가 균등하게 주어지며, 소득의 적정한 분배를 통해 사회구성원 간의 실질적인 평등과 복지를 지향하는 경제의 안정적 성장을 뜻"}], "전문": [{"word": "역사와 전통", "desc": "계승해야 할 전통은 사회적 폐습과 불의를 제외한 긍정적인 전통을 뜻하며, 법질서 완비 이전 헌법 제정 이전의 법적 관계와의 연속성을 인정하는 근거가 됨"}, {"word": "대한국민", "desc": "헌법 전문 전체의 주어로서 대한국민이 헌법제정권력자이자 주권자임을 선언하며, 헌법을 만들고 고치는 힘의 원천이 국민에게 있다는 국민주권주의를 명시한 것으로 헌법 개정으로도 변경할 수 없는 핵심 이념임"}, {"word": "임시정부의 법통", "desc": "3·1운동을 계기로 민주공화국이라는 국가 형태에 대한 합의가 확고해졌음을 확인하고, 국가가 독립유공자·유족을 예우하고 일본군 위안부 등 피해자들의 존엄과 가치를 회복시켜야 할 헌법적 보호 의무의 근거가 됨 (헌재 2005. 6. 30. 2004헌마859 ; 헌재 2011. 8. 30. 2006헌마788)"}, {"word": "4·19민주이념", "desc": "부정선거와 독재에 항거하여 민주주의를 지켜낸 4·19 혁명 정신을 명시한 것으로, 헌법학계와 대법원은 이를 민주질서 수호를 위한 저항권과 시민불복종을 헌법이 간접적으로 인정한 것으로 해석함 (대판 1997. 4. 17. 96도3376 전원합의체 참조)"}, {"word": "평화적 통일의 사명", "desc": "무력에 의한 통일 방식을 배제하고 자유민주적 기본질서에 입각한 대화와 평화적 교류를 통해 통일을 성취해야 한다는 평화통일주의를 헌법의 기본원리로 명시한 것임 (헌재 1997. 1. 16. 92헌바6등)"}, {"word": "사회적 폐습과 불의 타파", "desc": "국가는 공권력 행사나 법령이 사회적 폐습과 불의에 기여하지 않도록 제도를 개선할 의무를 지며, 사인에 의해 불의가 자행될 때 국가가 이를 막아야 할 기본권 보호 의무를 도출하는 근거가 됨 (헌재 2001. 8. 30. 99헌바92 참조)", "anchor": "사회적 폐습과 불의를 타파"}, {"word": "자유민주적 기본질서", "desc": "개인의 자율적 이성을 존중하는 자유주의와 국가권력이 국민에게 귀속되는 민주주의의 결합이 우리 헌법의 지배원리임을 명시하며, '조화'는 사회구성원 전체의 복지를 위해 자유를 조절할 수 있다는 사회복지적 요소를 포함함"}, {"word": "기회의 균등", "desc": "형식적 평등을 넘어 능력을 발휘할 법적 기회를 보장하고, 적정한 소득분배를 통해 빈부격차를 해소하여 균등한 경제적 기회를 도모하며, 자유시장경제질서를 기본으로 하면서도 경제민주화와 사회국가원리를 수용하고 있음을 천명함 (헌재 1998. 5. 28. 96헌가4등 ; 헌재 1999. 12. 23. 98헌마363)", "anchor": "기회를 균등히"}, {"word": "세계평화와 인류공영", "desc": "외적 팽창주의와 침략전쟁을 부인하고 세계 평화와 공존을 지향하는 국제평화주의를 천명한 것으로, 기후위기 대응 등 국제사회에서 대한민국이 마땅히 져야 할 책임을 표현한 것이기도 함"}, {"word": "자손의 안전·자유·행복", "desc": "세대 간 정의의 원칙을 선언한 것으로, 현세대의 단기적 이익을 위해 미래 세대의 이익을 불공정하게 희생시켜서는 안 된다는 점을 명시하며 국가의 기본권 보호 의무의 근거가 됨 (헌재 2024. 8. 29. 2020헌마389등)", "anchor": "자손의 안전과 자유와 행복"}]};
const CASES        = {"1": {"전체": [{"type": "판례", "text": "대통령이 국민으로부터 위임받은 권한을 사적으로 남용하고 비공식 인물(최서원)의 국정 개입을 허용한 행위는 대의민주제 원리와 법치주의를 심각하게 훼손한 것으로, 국민의 신임을 배반한 최고권력자를 파면함(헌재 2017. 3. 10. 2016헌나1)"}]}, "2": {"전체": [{"type": "판례", "text": "주민등록이 불가능한 재외국민의 선거권을 전면 박탈한 공직선거법 조항은 재외국민도 주권자인 국민임에도 참정권과 평등권을 심각하게 침해하는 위헌임(헌재 2007. 6. 28. 2004헌마644등)"}]}, "3": {"전체": [{"type": "판례", "text": "한일어업협정으로 독도가 중간수역에 포함된 것이 영토권 침해인지 문제된 사건에서, 영토의 변경은 국민의 존립 기반에 직접 영향을 미치므로 예외적으로 '영토권'을 기본권으로 인정할 수 있다고 최초로 밝혔으나, 해당 협정은 어업협정에 불과하여 영유권에 영향이 없어 합헌으로 기각함(헌재 2001. 3. 21. 99헌마139등)"}]}, "4": {"전체": [{"type": "판례", "text": "북한은 평화통일의 대화·협력 동반자이면서 동시에 반국가단체라는 이중적 지위를 가지므로, 남북교류협력법에 따른 교류 추진과 국가보안법에 따른 반국가활동 규제를 병행하는 것은 헌법상 평화통일 원칙에 위배되지 않음(헌재 1997. 1. 16. 92헌바6등)"}]}, "5": {"전체": [{"type": "판례", "text": "대통령의 이라크 파병 결정은 국가 안보와 국익을 고려한 고도의 정치적 결단(통치행위)으로서 대의기관의 판단이 존중되어야 하므로, 헌법재판소가 침략전쟁 해당 여부를 법적으로 심사하는 것은 자제해야 한다며 각하함(헌재 2004. 4. 29. 2003헌마814)"}]}, "6": {"전체": [{"type": "판례", "text": "전라북도가 지역 농산물 우선 사용을 규정한 학교급식 조례는 국내법과 동일한 효력을 가지는 GATT의 내국민대우 원칙에 위반되므로 효력이 없음(대법원 2005. 9. 9. 2004추10)"}]}, "7": {"전체": [{"type": "판례", "text": "교원이 '그 밖의 정치단체'를 결성·가입하는 것을 전면 금지하고 형사처벌하는 조항은 개념이 지나치게 광범위하고 불명확하여 죄형법정주의의 명확성 원칙에 어긋나며, 공무원의 정치적 표현 및 결사의 자유를 과도하게 침해하는 헌법불합치임(헌재 2020. 4. 23. 2018헌마551)"}]}, "8": {"전체": [{"type": "판례", "text": "통합진보당 주도 세력이 폭력적 수단으로 자유민주주의 체제 전복을 모의하는 등 민주적 기본질서에 실질적 해악을 끼치는 구체적 위험이 있다고 보아, 헌정 사상 최초로 위헌정당 강제 해산을 결정함(헌재 2014. 12. 19. 2013헌다1)"}]}, "9": {"전체": [{"type": "판례", "text": "동성동본 금혼 제도는 남계혈통 중심의 가부장적 인습에 불과할 뿐 헌법 제9조가 보호하는 보편타당한 전통윤리로 볼 수 없고, 오히려 개인의 존엄과 양성평등을 침해하는 것이므로 헌법에 위배됨(헌재 1997. 7. 16. 95헌가6등)"}]}, "10": {"전체": [{"type": "판례", "text": "일본군 위안부 피해자들의 배상청구권 분쟁 해결을 위한 조약상 절차를 밟지 않고 소극적으로 방치한 정부의 부작위는, 피해자들의 인간으로서의 존엄과 가치 회복이라는 가장 근본적인 국가 보호 의무를 저버린 위헌임(헌재 2011. 8. 30. 2006헌마788)"}]}, "11": {"1": [{"type": "판례", "text": "국가기관 채용시험에서 제대군인에게 만점의 3~5%를 가산하는 군가산점 제도는 성별에 의한 간접차별을 초래하여 여성·장애인 등 비제대군인의 공무담임권과 평등권을 침해하는 위헌임(헌재 1999. 12. 23. 98헌마363)"}], "2": [{"type": "판례", "text": "국가유공자·독립유공자 유족에게 서훈 등급에 따라 부가연금을 차등 지급하거나 취업에서 혜택을 주는 제도는 헌법이 인정하는 합리적 우대일 뿐, 헌법이 금지하는 새로운 사회적 특수계급을 창설하는 위헌적 제도가 아님(헌재 1997. 6. 26. 94헌마52)"}], "3": [{"type": "판례", "text": "영전일대의 원칙은 훈장 그 자체의 세습을 금지하는 취지이므로, 훈장에 따르는 금전적 혜택이나 연금을 사후에 독립유공자 유족에게 지급하는 국가보훈 제도까지 금지하는 것은 아니어서 합헌임(헌재 1997. 6. 26. 94헌마52)"}]}, "12": {"1": [{"type": "판례", "text": "군인에게 징계처분으로 최대 15일간 부대 내 구금장소에 감금하는 영창 제도는 형사절차가 아닌 징계절차라도 신체의 자유를 물리적으로 박탈하는 구금에 해당하므로, 과잉금지원칙을 위배하여 신체의 자유를 침해하는 위헌임(헌재 2020. 9. 24. 2017헌바157)"}], "2": [{"type": "판례", "text": "형사재판 확정 전에 행정처분만으로 사업자에게 법 위반 사실의 공표를 강제하는 것은 진술거부권을 침해하고 무죄추정의 원칙에도 어긋나는 위헌임(헌재 2002. 1. 31. 2001헌바43)"}], "3": [{"type": "판례", "text": "법관이 아닌 특별검사가 직접 동행명령장을 발부하고 이를 거부하면 형사처벌하는 것은, 신체의 자유를 사실상 억압하여 강제로 특정 장소에 인치하는 것과 실질적으로 동일하므로 영장주의 원칙을 위반한 위헌임(헌재 2008. 1. 10. 2007헌마1468)"}], "4": [{"type": "판례", "text": "헌법 제12조 제4항의 '구속'은 형사절차뿐만 아니라 행정절차상 구속도 포함하므로, 인천공항 송환대기실에 억류된 난민신청자의 변호인 접견을 거부한 것은 변호인의 조력을 받을 권리를 침해한 위헌임(헌재 2018. 5. 31. 2014헌마346)"}], "5": [{"type": "판례", "text": "미란다 원칙 고지 의무를 위반한 채 불법 체포하려는 경찰관에게 시민이 물리력으로 저항한 행위는, 불법한 신체 침해에서 벗어나기 위한 정당방위에 해당하여 공무집행방해죄로 처벌할 수 없음(대법원 2006. 9. 8. 2006도2732)"}], "6": [{"type": "판례", "text": "불법체류 외국인에 대한 출입국관리법상 보호(구금) 조치는 이의신청·행정소송·인신보호법상 구제 청구 등 사후적 권리보호 수단이 충분히 마련되어 있으므로, 외국인의 신체의 자유를 침해하지 않는 합헌임(헌재 2014. 8. 28. 2012헌마686)"}], "7": [{"type": "판례", "text": "수사기관이 고문으로 임의성 없는 허위 자백을 강요한 행위는 헌법이 명시적으로 금지한 중대한 불법행위이므로, 국가는 그로 인해 유죄 판결까지 받은 피해자에게 발생한 손해를 배상할 책임이 있음(대법원 1993. 12. 21. 93다41587)"}]}, "13": {"1": [{"type": "판례", "text": "성폭력 범죄자에게 형벌 선고 후 추가로 신상정보 공개·고지명령을 부과하는 것은, 이중처벌금지원칙에서 말하는 '처벌'(국가형벌권 행사)에 해당하지 않는 비형벌적 보안처분이므로 이중처벌이 아닌 합헌임(헌재 2016. 3. 31. 2015헌바196)"}], "2": [{"type": "판례", "text": "친일반민족행위자의 재산을 취득 시점으로 소급하여 국가에 귀속시키는 특별법은 진정소급입법에 해당하지만, 역사적 정의 구현이라는 압도적인 공익적 필요성이 예외적으로 소급입법을 정당화하므로 소급입법금지원칙에 위배되지 않는 합헌임(헌재 2011. 3. 31. 2008헌바141)"}], "3": [{"type": "판례", "text": "후보자 배우자의 선거범죄로 후보자의 당선을 무효로 하는 공직선거법 조항은, 친족이라는 이유만으로 불이익을 주는 연좌제가 아니라 선거에서 운명공동체를 형성하는 배우자의 실질적 역할에 근거하여 후보자 본인에게 연대책임을 묻는 것이므로 연좌제 금지 원칙에 위배되지 않는 합헌임(헌재 2005. 12. 22. 2005헌마19)"}]}, "14": {"전체": [{"type": "판례", "text": "병역의무 해소 전 복수국적자의 국적이탈을 정당한 사유의 예외 없이 전면 금지한 국적법 조항은, 피해의 최소성 원칙에 위배되어 국적이탈의 자유(거주·이전의 자유)를 침해하는 헌법불합치임(헌재 2020. 9. 24. 2016헌마889)"}]}, "15": {"전체": [{"type": "판례", "text": "경비업자에게 다른 업종의 겸영을 일체 금지한 경비업법 조항은, 능력·자격과 무관한 객관적 사유에 의한 가장 심각한 직업 제한으로서 월등한 공익 없이 과잉금지원칙을 위반하여 직업선택의 자유를 침해하는 위헌임(헌재 2002. 4. 25. 2001헌마614)"}]}, "16": {"전체": [{"type": "판례", "text": "피의자 소재 개연성만 소명되면 긴급한 사정 여부를 구별하지 않고 무조건 영장 없이 타인의 주거를 수색할 수 있도록 허용한 형사소송법 조항은, 헌법이 명시한 영장주의 예외 요건을 벗어난 헌법불합치임(헌재 2018. 4. 26. 2015헌바370)"}]}, "17": {"전체": [{"type": "판례", "text": "4급 이상 공직자의 병역사항 공개 시 질병명이라는 민감한 개인정보를 아무런 예외 없이 무차별적으로 공개하도록 강제한 것은, 침해의 최소성 요건을 위반하여 사생활의 비밀과 자유를 중대하게 침해하는 위헌임(헌재 2007. 5. 31. 2005헌마1139)"}]}, "18": {"전체": [{"type": "판례", "text": "인터넷회선을 통해 흐르는 불특정 다수인의 모든 정보를 방대하게 수집하는 패킷감청을 허용하면서 사후 통제 수단을 제대로 마련하지 않은 통신비밀보호법 조항은, 과잉금지원칙에 반하여 통신의 비밀과 사생활의 비밀 및 자유를 심각하게 침해하는 헌법불합치임(헌재 2018. 8. 30. 2016헌마263)"}]}, "19": {"전체": [{"type": "판례", "text": "양심적 병역거부자에게 대체복무제를 마련하지 않고 일률적으로 형사처벌만 하는 병역법 조항은, 과잉금지원칙을 위반하여 양심의 자유를 과도하게 침해하는 헌법불합치임(헌재 2018. 6. 28. 2011헌바379등)"}]}, "20": {"1": [{"type": "판례", "text": "무죄추정 원칙이 적용되는 미결수용자의 종교의식·행사 참석을 수형자와 달리 전면적으로 불허한 구치소 처우는, 과잉금지원칙을 위반하여 미결수용자의 종교의 자유를 심각하게 침해하는 위헌임(헌재 2011. 12. 29. 2009헌마527)"}], "2": [{"type": "판례", "text": "사법시험 제1차 시험을 일요일에 시행한 것은, 일요일이 특정 종교의 축일이 아닌 일반 법정 공휴일이므로 특정 종교에 대한 우대나 차별이 아니어서 정교분리 원칙에 위배되지 않는 합헌임(헌재 2001. 9. 27. 2000헌마159)"}]}, "21": {"1": [{"type": "판례", "text": "'공익을 해할 목적'의 허위 통신을 형사처벌하는 구 전기통신기본법 조항은, '공익'이라는 개념이 지나치게 추상적이고 불명확하여 표현의 자유에서 요구되는 명확성의 원칙에 위배되는 위헌임(헌재 2010. 12. 28. 2008헌바157)"}], "2": [{"type": "판례", "text": "보건복지부장관이 의사협회에 위탁하여 실시하는 의료광고 사전심의제도는 실질적으로 행정권이 주체가 된 사전검열에 해당하여, 헌법 제21조 제2항의 사전검열 금지원칙에 정면으로 위반되는 위헌임(헌재 2015. 12. 23. 2015헌바75)"}], "3": [{"type": "판례", "text": "발행부수가 많다는 이유만으로 합리적 근거 없이 대형 일간신문을 시장지배적 사업자로 규정하여 신문발전기금 지원을 전면 배제한 신문법 규정은, 평등권과 신문의 자유를 침해하는 위헌임(헌재 2006. 6. 29. 2005헌마165)"}], "4": [{"type": "판례", "text": "언론기관의 일방적 보도로 인격권을 침해당한 피해자가 동일 매체를 통해 방어할 수 있도록 보장하는 정정보도청구권 제도는, 언론의 자유와 타인의 권리를 합리적으로 조화시킨 합헌적 제도임(헌재 1991. 9. 16. 89헌마165)"}]}, "22": {"1": [{"type": "판례", "text": "교육부장관이 로스쿨 신입생 모집을 2년간 정지한 처분은, 학생 선발·전형이라는 대학 자율성의 본질적 핵심 사항을 침해의 최소성 원칙에 어긋나게 과도하게 제한한 위헌적 공권력 행사임(헌재 2015. 12. 23. 2014헌마1149)"}], "2": [{"type": "판례", "text": "정식 특허권을 획득한 '숙취해소용 천연차'에 대해 보건당국 고시로 식품에 '숙취해소' 표시를 원천 금지한 것은, 헌법상 보호받는 특허권과 직업수행의 자유를 부당하게 침해하는 위헌임(헌재 2000. 3. 30. 99헌마143)"}]}, "23": {"1": [{"type": "판례", "text": "법 시행 이전부터 토양오염 시설을 양수·소유한 자에게 소급적으로 무한한 오염원인자 책임을 지우는 구 토양환경보전법 규정은, 진정소급입법으로서 신뢰보호 원칙에 위배되어 양수인의 재산권을 부당하게 침해하는 헌법불합치임(헌재 2012. 8. 23. 2010헌바28)"}], "2": [{"type": "판례", "text": "도시정비사업으로 새롭게 설치되는 공공시설 부지를 무상 귀속되도록 강제하는 것은, 공용수용이 아니라 재산권의 사회적 제약을 구체화한 헌법 제23조 제1·2항에 근거한 합헌적 조치임(헌재 2011. 10. 25. 2011헌바355)"}], "3": [{"type": "판례", "text": "공익사업 토지수용 시 이주대책 대상자에서 세입자를 제외한 것은, 이주대책이 헌법상 정당한 보상에 필연적으로 포함되는 것이 아니라 입법자의 재량이 허용되는 생활보상적·사회정책적 배려이므로 재산권 침해가 아닌 합헌임(헌재 2006. 2. 23. 2004헌마19)"}]}, "24": {"전체": [{"type": "판례", "text": "범죄의 종류와 경중을 전혀 고려하지 않고 집행유예자와 수형자 모두의 선거권을 전면·획일적으로 박탈한 구 공직선거법 조항은, 침해의 최소성 원칙에 어긋나 선거권을 과도하게 제한하는 헌법불합치임(헌재 2014. 1. 28. 2012헌마409등)"}]}, "25": {"전체": [{"type": "판례", "text": "아동학대관련범죄로 형이 확정된 사람을 범죄 경중·재범 위험성·직무의 아동 관련성 여부를 불문하고 영구적·획일적으로 모든 공무원 및 부사관 임용에서 차단한 결격사유 조항은, 침해의 최소성을 위반하여 공무담임권을 과도하게 제한하는 헌법불합치임(헌재 2020. 11. 26. 2020헌마1181)"}]}, "27": {"1": [{"type": "판례", "text": "교원소청심사위원회의 재심결정을 최종적인 것으로 하여 학교법인의 행정소송 청구를 원천 차단한 법률 조항은, 법원에 일체의 법률적 쟁송에 대한 재판권능을 부여한 헌법에 위배되고 학교법인의 재판청구권을 심각하게 침해하는 위헌임(헌재 2006. 2. 23. 2005헌가7)"}], "2": [{"type": "판례", "text": "'군용물'에 '군사시설'이 포함되지 않음에도 군사시설을 손괴한 일반 국민을 평시에도 예외 없이 군사법원에서 재판받도록 강제한 구 군사법원법 조항은, 헌법과 법률이 정한 법관에 의한 재판을 받을 권리를 침해하는 위헌임(헌재 2013. 11. 28. 2012헌가10)"}], "3": [{"type": "판례", "text": "신속한 재판을 받을 권리는 헌법상 기본권으로 보장되지만, 특정 기간 내 판결을 요구할 수 있는 직접적·구체적 청구권은 입법자가 법률로 형성하지 않는 한 헌법으로부터 자동적으로 발생하지는 않음(헌재 1999. 9. 16. 98헌마75)"}], "4": [{"type": "판례", "text": "1심에서 금고 이상의 형을 선고받았다는 사실만으로 지방자치단체장의 직무를 정지시킨 구 지방자치법 조항은, 형이 확정되지 않은 피고인에게 유죄에 준하는 불이익을 주는 것으로 무죄추정의 원칙에 반하여 공무담임권을 침해하는 위헌임(헌재 2010. 9. 2. 2010헌마418)"}], "5": [{"type": "판례", "text": "가해 차량이 종합보험에 가입되어 있다는 이유만으로 중상해 피해자에 대해 검사의 공소 제기를 일률적으로 차단한 교통사고처리특례법 조항은, 중상해 피해자의 재판절차진술권을 합리적 이유 없이 전면 박탈하고 평등권을 침해하는 위헌임(헌재 2009. 2. 26. 2005헌마764등)"}]}, "28": {"전체": [{"type": "판례", "text": "무죄재판 확정 후 단 1년으로 형사보상청구권의 제척기간을 제한한 구 형사보상법 조항은, 보상 청구를 현저히 곤란하게 하여 권리구제의 실효성을 박탈하는 등 입법재량의 한계를 넘어 형사보상청구권을 침해하는 위헌임(헌재 2010. 7. 29. 2008헌가4)"}]}, "29": {"1": [{"type": "판례", "text": "공무원이 조직적으로 민간인 집단 희생 등 중대한 인권침해를 저지른 과거사 사건에 일반 손해배상 사건과 동일한 소멸시효를 적용하는 민법 조항은, 가해자 보호와 법적 안정성만을 지나치게 중시하여 국가배상청구권 보장을 외면한 위헌임(헌재 2018. 8. 30. 2014헌바148)"}], "2": [{"type": "판례", "text": "일반 국민이 직무집행 중인 군인과 공동불법행위를 저질러 피해 군인에게 손해를 전부 배상한 경우에도 가해 군인의 부담 부분에 대한 국가 구상권을 허용하지 않는 것으로 넓게 해석하는 것은, 이중배상금지의 취지를 벗어나 일반 국민의 재산권을 부당하게 과잉제한하는 한정위헌임(헌재 1994. 12. 29. 93헌바21)"}]}, "30": {"전체": [{"type": "판례", "text": "범죄피해구조금 신청 기한을 '피해 발생을 안 날로부터 2년, 발생한 날로부터 5년'으로 제한한 구 범죄피해자구조법 규정은, 신속하고 효율적인 구조업무 수행을 위한 합리적인 기간 설정으로서 범죄피해자구조청구권을 침해하지 않는 합헌임(헌재 2011. 12. 29. 2009헌마354)"}]}, "31": {"1": [{"type": "판례", "text": "고등학교 퇴학 후 6개월 미만인 자의 검정고시 응시를 일률적으로 금지한 교육부 규칙은, 균등하게 교육받을 자유권적 기본권을 침해의 최소성 원칙에 어긋나게 과도하게 제한하는 위헌임(헌재 2008. 4. 24. 2007헌마1456)"}], "2": [{"type": "판례", "text": "중학교 등 초등교육 이상을 의무교육에 포함시키는 것은 헌법 규정만으로 즉시 발생하는 권리가 아니라, 국가 재정 형편 등을 고려하여 입법권자가 법률로 제정·시행할 때 비로소 구체적인 헌법상 권리로 인정됨(헌재 1991. 2. 11. 90헌가27)"}], "3": [{"type": "판례", "text": "아파트 수분양자 개인에게 학교용지 매입 비용을 전가하는 구 학교용지부담금 부과 조항은, 의무교육 시행을 위한 학교시설 용지 확보 비용은 국가 일반재정으로 충당해야 한다는 헌법상 의무교육 무상원칙에 정면으로 위배되는 위헌임(헌재 2012. 8. 23. 2010헌바220)"}], "4": [{"type": "판례", "text": "교육의 정치적 중립성과 학생의 학습권 보호는 사립학교에도 동일하게 요구되는 헌법적 가치이므로, 사립학교 교원의 쟁의행위를 전면 금지하는 것은 합리적 이유가 있어 단결권 등을 과도하게 침해하거나 평등원칙에 위반되지 않는 합헌임(헌재 1991. 7. 22. 89헌가106 등)"}], "5": [{"type": "판례", "text": "교원이 고의로 수업을 거부할 자유는 학생의 평생학습권을 본질적으로 침해하므로 어떠한 경우에도 정당화될 수 없음(대법원 2007. 9. 20. 2005다25298)"}], "6": [{"type": "판례", "text": "고등학교 입학 방법과 절차에 관한 기준을 법률에 전혀 두지 않고 전적으로 하위 법령에 포괄적으로 위임한 구 초·중등교육법 조항은, 교육제도 법정주의와 포괄위임입법금지 원칙에 위배되는 위헌임(헌재 2012. 11. 29. 2011헌마827)"}]}, "32": {"1": [{"type": "판례", "text": "2018·2019년 최저임금 고시가 사용자의 계약의 자유를 침해한다는 주장에 대해, 근로자의 인간다운 생활 보장이라는 공익이 소상공인·자영업자의 사익 침해보다 훨씬 크므로 과잉금지원칙을 위배하지 않는 합헌임(헌재 2019. 12. 27. 2017헌마1366)"}], "3": [{"type": "판례", "text": "6개월 미만 근무한 월급근로자를 해고예고제도 적용 대상에서 일률적으로 배제한 구 근로기준법 조항은, 갑작스러운 해고로부터 근로자를 보호하기 위한 최소한의 절차적 규율마저 저버린 것으로 헌법이 요구하는 인간의 존엄성을 침해하는 위헌임(헌재 2015. 12. 23. 2014헌바3)"}], "4": [{"type": "판례", "text": "국가기관 채용시험에서 제대군인에게 만점의 3~5%를 가산하는 제도는, 헌법이 근로·고용 영역에서 특별히 요구하는 여성 보호와 남녀평등에 반하여 여성과 장애인의 공직 취임 기회를 크게 제약하는 부당한 차별로 위헌임(헌재 1999. 12. 23. 98헌마363)"}], "6": [{"type": "판례", "text": "헌법에 명시되지 않은 '일반 국가유공자의 유가족'에게까지 만점의 10%에 달하는 가산점을 부여한 법률은, 명시적 헌법적 근거 없이 차별 효과가 지나치게 커서 일반 응시자의 공무담임권을 과도하게 침해하는 헌법불합치임(헌재 2006. 2. 23. 2004헌마675)"}]}, "33": {"1": [{"type": "판례", "text": "단순 파업은 무조건 업무방해죄가 성립하는 것이 아니라, 사용자가 예측할 수 없는 시기에 전격적으로 이루어져 사업 운영에 심대한 혼란을 초래한 예외적인 경우에만 형사처벌이 가능함(대법원 2011. 3. 17. 2007도482 전원합의체)"}], "2": [{"type": "판례", "text": "공무원에게 쟁의행위를 전면 금지한 공무원노조법 규정은, 공무원이 국민 전체에 대한 봉사자 지위를 가지며 파업 시 국가기능 마비 우려가 크다는 특수성을 고려한 헌법에 근거한 합헌적 입법형성권의 행사임(헌재 2008. 12. 26. 2005헌마971)"}], "3": [{"type": "판례", "text": "국가중요시설 경비를 담당하는 특수경비원의 일체의 쟁의행위를 금지한 경비업법 조항은, 무기 휴대 근무의 특수성과 강한 공공성을 감안할 때 국가 중요시설 안전이라는 공익이 매우 크므로 과잉금지원칙에 위반되지 않는 합헌임(헌재 2009. 10. 29. 2007헌마1359)"}]}, "34": {"1": [{"type": "판례", "text": "생계보호기준의 위헌 여부는 단편적인 생계보호급여만이 아니라 국가가 제공하는 각종 급여와 부담 감면 등을 총괄한 수준으로 심사해야 하며, 입법·행정부의 재량이 명백히 일탈되지 않는 한 위헌이 아닌 합헌임(헌재 1997. 5. 29. 94헌마33)"}], "2": [{"type": "판례", "text": "사회보장수급권은 헌법 제34조에서 직접 도출되어 무조건 주어지는 권리가 아니라, 입법자가 재정 여건 등을 고려하여 수급요건·대상·금액 등을 법률로 형성할 때 비로소 구체적으로 발생하는 법률적 차원의 권리임(헌재 2010. 4. 29. 2009헌바102)"}], "4": [{"type": "판례", "text": "자동차사고 피해가족 유자녀에게 생활자금을 대출 형태로 지원한 것은, 한정된 국가 재원을 고려한 합리적인 정책적 판단으로 아동의 인간다운 생활을 할 권리를 침해하지 않는 합헌임(헌재 2021. 9. 30. 2021헌마473)"}], "5": [{"type": "판례", "text": "헌법 제34조의 장애인 복지향상 노력 의무 규정만으로는 국가에 대하여 특정 시기에 저상버스 도입과 같은 특정한 내용과 형태의 행위를 강제하거나 청구할 수 있는 구체적인 헌법적 의무가 바로 도출되지는 않음(헌재 2002. 12. 18. 2002헌마52)"}], "6": [{"type": "판례", "text": "세월호 참사와 관련하여 재난 상황이 발생했다고 하여 헌법 규정으로부터 대통령이 직접 구조 활동에 참여해야 하는 등의 구체적이고 특정한 작위의무가 즉각적으로 발생한다고 보기는 어려움(헌재 2017. 3. 10. 2016헌나1)"}]}, "35": {"1": [{"type": "판례", "text": "선거운동 시 확성장치의 소음 규제기준을 전혀 두지 않은 공직선거법 부작위는, 국민의 건강하고 쾌적한 환경권 보호를 위한 최소한의 보호조치마저 다하지 않은 과소보호금지원칙 위반으로 위헌(헌법불합치)임(헌재 2019. 12. 27. 2018헌마730)"}], "2": [{"type": "판례", "text": "국가의 온실가스 감축 목표가 기후위기에 현저히 불충분하여 국가의 보호의무를 다하지 않았다면 예외적으로 환경권 침해를 물을 수 있다고 보아 헌법불합치 결정을 내림(헌재 2024. 8. 29. 2020헌마389등)"}], "3": [{"type": "판례", "text": "선거운동 확성장치 소음 규제를 전혀 마련하지 않은 것은, 헌법 제35조 제3항이 부과한 양호한 주거환경을 위해 노력해야 할 국가의 의무에 비추어 볼 때 현저한 의무 위반에 해당하는 위헌(헌법불합치)임(헌재 2019. 12. 27. 2018헌마730)"}]}, "36": {"1": [{"type": "판례", "text": "부부의 자산소득을 합산 과세하여 혼인한 부부에게 독신자보다 높은 누진세율을 적용한 구 소득세법 조항은, 정당한 이유 없이 혼인한 자를 차별하는 혼인에 따른 불합리한 차별로 위헌임(헌재 2002. 8. 29. 2001헌바82)"}], "2": [{"type": "판례", "text": "세 번째 이후 자녀에 대한 분만급여 지급을 제한한 법령 규정은, 당시 국가의 인구정책적 합리적 목적을 가진 제한으로 인정되어 헌법상 모성보호 조항에 위배되지 않는 합헌임(헌재 1997. 3. 27. 95헌마390)"}], "3": [{"type": "판례", "text": "비의료인의 침구 시술 등을 일률적으로 금지하고 형사처벌하는 의료법 규정은, 국민의 생명권과 건강권 보호 및 헌법 제36조 제3항에 따른 국민 보건에 관한 국가의 보호의무를 이행하기 위한 합헌적 수단임(헌재 2005. 5. 26. 2003헌바86)"}]}, "37": {"1": [{"type": "판례", "text": "헌법에 명시되지 않은 부모의 자녀 교육권은 제10조·제36조 제1항과 결합하여 제37조 제1항으로부터 새롭게 도출되는 중대한 헌법상 기본권으로 인정됨(헌재 2000. 4. 27. 98헌가16)"}], "2": [{"type": "판례", "text": "시각장애인에게만 안마사 자격을 인정하는 의료법 조항은, 안마업 외 생계 수단이 전무한 시각장애인 보호라는 목적의 정당성과 법익의 균형성이 크므로 과잉금지원칙을 충족하는 합헌임(헌재 2008. 10. 30. 2006헌마1098)"}]}, "38": {"전체": [{"type": "판례", "text": "조세란 공권력이 반대급부 없이 일반 국민으로부터 강제적으로 부과·징수하는 금전급부로서, 납세의무 부과는 반드시 국회가 제정한 형식적 법률에 의거해야 한다는 조세법률주의의 한계를 엄격히 확인함(헌재 1990. 9. 3. 89헌가95)"}]}, "39": {"1": [{"type": "판례", "text": "남성에게만 병역의무를 부과하는 병역법은, 남성이 전투에 더 적합한 신체적 능력을 갖추고 있고 징집 대상자 범위 결정은 입법자의 광범위한 정책적 재량에 속하므로 평등권을 침해하지 않는 합헌임(헌재 2010. 11. 25. 2006헌마328)"}], "2": [{"type": "판례", "text": "군법무관 복무 후 전역한 자의 민간 변호사 개업 지역을 제한한 구 변호사법 규정은, 강제적 병역의무 이행으로 인해 발생한 명백하고 직접적인 법적 불이익으로서 헌법이 엄격히 금지하는 병역의무 이행으로 인한 불이익한 처우에 정면으로 위반되는 위헌임(헌재 1989. 11. 20. 89헌가102)"}]}, "40": {"전체": [{"type": "판례", "text": "전 국민에게 부담을 지우는 TV수신료 금액 결정은 국회가 직접 법률로써 결정해야 할 중요 사항임에도, 이를 한국방송공사 이사회에 포괄적으로 위임한 구 한국방송공사법 규정은 의회유보원칙에 위배되는 위헌임(헌재 1999. 5. 27. 98헌바70)"}]}, "41": {"전체": [{"type": "판례", "text": "지역구 후보자 득표 비율로 비례대표 의석을 배분하는 1인 1표제는 유권자가 지지 정당을 직접 선택할 기회를 원천 박탈하여 직접선거 원칙과 평등선거 원칙에 위배되는 위헌으로, 이 결정이 현행 1인 2표제 도입의 계기가 됨(헌재 2001. 7. 19. 2000헌마91등)"}]}, "42": {"전체": [{"type": "보충", "text": "국회의원의 임기는 헌법상 4년이며, 보궐선거로 당선된 의원의 임기는 새롭게 4년이 시작되는 것이 아니라 전임자의 잔임기간만을 채움"}]}, "43": {"전체": [{"type": "판례", "text": "국회의원으로 당선된 사립학교 교원에게 임기 개시일 전까지 교원직 사직을 강제한 국회법 규정은, 국회의원이 직무에 전념하고 공정성을 확보하기 위해 꼭 필요한 제한이므로 공무담임권을 과도하게 침해하지 않는 합헌임(헌재 2015. 4. 30. 2014헌마621)"}]}, "44": {"전체": [{"type": "보충", "text": "불체포특권은 행정부의 부당한 물리적 억압으로부터 의원의 원내 활동을 보장하기 위한 제도로, 현행범이 아닌 이상 국회 동의 없이 체포될 수 없으며 회기 전 체포된 경우에도 국회 요구 시 즉시 석방됨"}]}, "45": {"전체": [{"type": "판례", "text": "발언 내용이 명백히 허위임을 알면서 오직 타인의 명예를 훼손할 악의적 목적으로 발언한 경우에는 정당한 직무수행으로 볼 수 없어 면책특권의 보호를 받지 못하고 형사처벌의 대상이 됨(대법원 2007. 1. 12. 2005다57752)"}]}, "46": {"전체": [{"type": "판례", "text": "정당 합의안에 반대하는 의원을 원내대표 요청으로 강제 사보임한 것은, 국회 내 원활한 다수결 형성이라는 헌법적 이익을 위한 것으로 자유위임원칙을 명백히 위반하여 해당 의원의 심의·표결권을 침해한 것이 아닌 합헌임(헌재 2020. 5. 27. 2019헌라1)"}]}, "47": {"전체": [{"type": "보충", "text": "정기회는 매년 9월 1일에 100일 이내로 열려 예산안·결산을 심의하고, 임시회는 대통령 또는 재적의원 4분의 1 이상의 요구로 수시로 소집되어 30일 이내의 기간 동안 법률안 심의 등의 안건을 처리함"}]}, "48": {"전체": [{"type": "판례", "text": "국회의장이 변칙적 방법으로 법률안 가결을 선포하여 국회의원의 권한을 침해했다고 다투어지는 경우, 국회의원들은 국회의장을 상대로 헌법재판소에 권한쟁의심판을 청구할 적법한 당사자 자격이 있음을 최초로 인정함(헌재 1997. 7. 16. 96헌라2)"}]}, "49": {"전체": [{"type": "판례", "text": "의원 간 격렬한 몸싸움으로 표결 과정이 극도로 무질서해져 정당한 투표 여부조차 가릴 수 없는 상태에서 국회의장이 그대로 가결을 선포한 행위는, 헌법상 다수결의 원칙에 정면으로 위배되어 야당 의원들의 심의·표결권을 침해한 위헌임(헌재 2009. 10. 29. 2009헌라8)"}]}, "50": {"전체": [{"type": "판례", "text": "국가기밀 보안을 이유로 국회 정보위원회의 모든 회의를 법률로써 일률적·절대적으로 비공개하도록 강제한 국회법 조항은, 헌법상 의사공개원칙에 위배되어 국민의 알 권리를 중대하게 침해하는 위헌임(헌재 2022. 1. 27. 2018헌마1162)"}]}, "51": {"전체": [{"type": "보충", "text": "회기계속의 원칙이란 법률안이 하나의 회기 중 처리되지 못해도 다음 회기에서 계속 심의할 수 있도록 보장하는 원칙으로, 다만 국회의원의 4년 임기(입법기)가 만료되면 계류 중이던 법률안은 모두 자동 폐기됨"}]}, "52": {"전체": [{"type": "판례", "text": "법률안을 전산 시스템으로 접수한 행위만으로는 다른 의원의 심의·표결권이 침해될 수 없으며, 권한 침해는 법률안이 위원회나 본회의에 실제로 상정되어 심의 가능한 상태가 되었을 때 비로소 현실화되므로 단순 접수 단계에서의 권한쟁의 청구는 부적법하여 각하함(헌재 2019. 5. 28. 2019헌라2)"}]}, "53": {"전체": [{"type": "보충", "text": "대통령이 거부권을 행사한 상태로 국회의 4년 임기가 만료되면, 다음 대 국회에서 해당 법률안을 이어서 재의결할 수 없으므로 해당 법률안은 확정되지 못하고 폐기되는 것으로 해석함"}]}, "54": {"전체": [{"type": "보충", "text": "헌법 제54조는 예산안의 심의·확정 권한을 국회에 독점적으로 부여하여 재정민주주의를 실현하는 조항으로, 정부는 회계연도 개시 90일 전까지 예산안을 제출하고 국회는 30일 전까지 의결해야 하며, 기한 내 미통과 시를 대비하여 전년도 예산에 준한 최소 경비를 집행하는 준예산 제도를 안전장치로 둠"}]}, "55": {"전체": [{"type": "보충", "text": "계속비는 여러 해에 걸친 대규모 사업을 위해 미리 국회 의결을 받아 예산 1년주의의 예외를 인정하는 제도이며, 예비비는 예측 불가한 지출을 위해 총액으로 국회 의결을 얻되 지출 후 반드시 차기 국회의 사후 승인을 받도록 하여 의회의 재정 통제권을 보장하는 장치임"}]}, "56": {"전체": [{"type": "보충", "text": "추가경정예산은 예산 성립 후 부득이한 사정으로 예산 변경이 필요할 때 정부가 추가경정예산안을 편성해 국회에 제출하는 제도로, 국가 재정의 탄력성을 확보하면서도 국회의 예산 심의 권한을 유지하기 위한 조치임"}]}, "57": {"전체": [{"type": "보충", "text": "국회는 정부의 동의 없이 지출예산 각 항의 금액을 증가하거나 새 비목을 설치할 수 없으며, 이는 정부의 예산안 편성권을 존중하고 선심성 예산 증액 등 무분별한 재정 지출 확대를 막아 건전한 국가 재정을 유지하기 위한 헌법적 통제 장치임"}]}, "58": {"전체": [{"type": "보충", "text": "국채 모집이나 예산 외 국가 부담이 될 계약 체결은 결국 국민의 세금 부담으로 직결되므로, 헌법 제58조는 이에 대해 반드시 국회의 사전 의결을 거치도록 엄격히 통제함"}]}, "59": {"전체": [{"type": "판례", "text": "조세란 공권력의 주체가 반대급부 없이 국민으로부터 강제 징수하는 금전급부로서, 납세의무자·과세물건·과세표준·세율 등 조세 부과를 위한 모든 요건과 절차를 반드시 국회가 제정한 법률로 규정해야 한다는 조세법률주의의 한계를 엄격히 확인함(헌재 1990. 9. 3. 89헌가95)"}]}, "60": {"전체": [{"type": "판례", "text": "명칭이 '협정'이더라도 외국군대의 지위, 국가 재정 부담, 형사재판권 등 입법사항을 실질적 내용으로 포함한 한미행정협정(SOFA)은 헌법 제60조 제1항에 따라 당연히 국회의 동의를 요하는 조약으로 취급되어야 함(헌재 1999. 4. 29. 97헌가14)"}]}, "61": {"전체": [{"type": "판례", "text": "법관의 영장 없이 참고인에게 동행을 명령하고 거부 시 벌금형에 처하도록 한 것은, 심리적 강제를 통해 신체의 자유를 사실상 박탈하는 강제 인치와 다름없으므로 영장주의 원칙과 과잉금지원칙에 위배되는 위헌임(헌재 2008. 1. 10. 2007헌마1468)"}]}, "62": {"전체": [{"type": "보충", "text": "국무총리와 국무위원은 국회에 출석해 국정을 보고할 권리와 함께 출석 요구 시 반드시 답변할 의무를 지며, 이는 대통령제에 의원내각제적 성격을 가미한 것으로 국회의 정부 견제·통제 기능과 국민의 알 권리 충족을 위한 정보 수집적 기능을 수행함"}]}, "63": {"전체": [{"type": "보충", "text": "해임건의는 헌법·법률의 중대한 위반만을 요건으로 하는 탄핵소추와 달리 정책적 오류·무능력·정치적 실정 등을 이유로도 발동될 수 있으나, 국회가 해임건의를 의결하더라도 대통령에게 법적인 해임 구속력을 지우지는 않는 정치적 통제 수단임"}]}, "64": {"전체": [{"type": "판례", "text": "국회의원에 대한 '30일 출석정지' 중징계 처분에 대해, 헌법 제64조 제4항이 법원 제소를 금지하더라도 헌법재판소를 통한 권한쟁의심판 청구는 가능하다는 전제하에 해당 징계 처분의 효력을 일시적으로 정지시킨 가처분 신청을 인용함(헌재 2022. 3. 24. 2022헌사448)"}]}, "65": {"전체": [{"type": "판례", "text": "탄핵 사유인 헌법 위배에는 관습헌법 위반도 포함되지만, 대통령의 단순한 정책적 오류·국정운영 무능력·직무수행 미숙 등은 탄핵소추 사유에 해당하지 않는다고 명확히 선을 그어 탄핵 제도의 법적 한계를 확인함(헌재 2004. 5. 14. 2004헌나1)"}]}, "66": {"전체": [{"type": "판례", "text": "대통령이 특정 사인의 이익을 위해 지위와 권한을 남용하여 국가 기관을 동원한 행위는 대의민주제 원리와 법치주의를 훼손하고 헌법 제66조 제2항의 헌법 수호 책무를 저버린 중대한 법 위배 행위로서 파면 사유에 해당함(헌재 2017. 3. 10. 2016헌나1)"}]}, "67": {"전체": [{"type": "판례", "text": "대통령 선거는 국가 최고 권력 담당자를 선출하는 가장 중요한 선거이므로, 후보 난립을 막기 위해 다른 선거에 비해 높은 기탁금을 요구하는 것은 합리적 이유가 있어 피선거권을 침해하지 않는 합헌임(헌재 2012. 12. 27. 2012헌마402)"}]}, "68": {"전체": [{"type": "판례", "text": "탄핵 사유는 대통령 직위를 보유한 상태에서 범한 직무상 위법행위로 한정되므로, 취임 전 당선자 신분으로 한 행위는 형사처벌 대상이 될지언정 헌법상 탄핵 사유에는 해당하지 않음(헌재 2004. 5. 14. 2004헌나1)"}]}, "69": {"전체": [{"type": "판례", "text": "대통령의 성실한 직책수행의무는 헌법적 의무이나 '성실함'이라는 개념이 추상적이어서 사법적 판단의 대상이 되기 어려우므로, 재난 대응이 부적절하더라도 그 자체만으로는 탄핵소추 사유가 될 수 없음(헌재 2017. 3. 10. 2016헌나1)"}]}, "70": {"전체": [{"type": "판례", "text": "대통령이 임기 도중 정책 지지 확인을 위해 재신임 국민투표를 제안한 것은, 대표자 선출과 신임을 오직 선거로만 결정하도록 한 대의제 원리를 훼손하고 헌법상 허용되지 않는 위헌적 권한 행사임(헌재 2004. 5. 14. 2004헌나1)"}]}, "71": {"전체": [{"type": "판례", "text": "대통령이 해외 순방 중인 상황은 헌법 제71조의 '일시적으로 직무를 수행할 수 없는 사고'에 해당하므로, 국무총리가 주재한 국무회의에서 정당해산심판 청구를 의결한 것은 적법하고 절차적 위법이 없음(헌재 2014. 12. 19. 2013헌다1)"}]}, "72": {"전체": [{"type": "판례", "text": "헌법 제72조의 국민투표는 특정 정책에 대한 결정만을 의미할 뿐 인물에 대한 신임을 묻는 용도로 사용할 수 없으므로, 정책에 대통령 자신의 신임을 결부시키는 행위는 유권자에게 부당한 압력을 가하여 국민투표제를 위헌적으로 악용하는 것임(헌재 2004. 5. 14. 2004헌나1)"}]}, "73": {"전체": [{"type": "판례", "text": "명칭이 '협정'이더라도 외국 군대의 지위, 국가 재정 부담, 형사재판권 등 입법사항을 실질적 내용으로 포함한 한미행정협정(SOFA)은 반드시 국회의 체결·비준 동의를 거쳐야 하는 조약으로 취급되어야 함(헌재 1999. 4. 29. 97헌가14)"}]}, "74": {"전체": [{"type": "판례", "text": "이라크 파병 결정은 동맹국 관계·국가 안보·국익 등을 총체적으로 고려한 고도의 정치적 결단(통치행위)으로서, 헌법과 법률상 절차(국회 동의)를 준수한 이상 사법기관이 법적 잣대만으로 그 옳고 그름을 심판하는 것은 자제해야 한다며 각하함(헌재 2004. 4. 29. 2003헌마814)"}]}, "75": {"전체": [{"type": "판례", "text": "포괄적 위임입법을 금지하고 '구체적으로 범위를 정하여 위임받은 사항'으로 한정하는 이유는, 국민의 기본권과 관련된 본질적 사항은 국민이 선출한 국회가 직접 법률로 정해야 한다는 권력분립과 법치주의 원리 때문임(헌재 1998. 11. 26. 97헌바31)"}]}, "76": {"전체": [{"type": "판례", "text": "금융실명제 긴급재정경제명령은 통치행위로서 가급적 존중되어야 하지만, 국민의 기본권 침해와 직접 관련된 경우에는 헌법재판소의 심판 대상이 될 수 있다고 사법적 통제의 길을 열어두었으며, 해당 명령 자체는 위기 극복을 위한 합헌으로 결정함(헌재 1996. 2. 29. 93헌마186)"}]}, "77": {"전체": [{"type": "판례", "text": "비상계엄 선포는 원칙적으로 사법심사 대상이 아니나, 5·17 신군부의 비상계엄 전국 확대처럼 국헌문란 목적의 폭동·협박 수단으로 행해진 예외적인 경우에는 법원이 내란죄 해당 여부를 직접 심사하여 처벌할 수 있음(대법원 1997. 4. 17. 96도3376 전원합의체)"}]}, "78": {"전체": [{"type": "보충", "text": "대통령은 헌법과 법률이 정하는 바에 따라 공무원을 임면할 최고 권한을 가지며, 실무상 5급 이상은 일정한 절차를 거쳐 대통령이, 6급 이하는 소속 장관이 임용하도록 국가공무원법으로 권한을 분배하여 운영함"}]}, "79": {"전체": [{"type": "판례", "text": "전직 대통령에 대한 특별사면에 반발한 일반 국민의 헌법소원은, 타인에 대한 사면으로 인해 국민 자신의 기본권이 직접 침해되었다는 자기관련성이 결여되어 부적법하다며 각하함(헌재 1998. 9. 30. 97헌마404)"}]}, "80": {"전체": [{"type": "판례", "text": "이미 수여된 서훈을 사후에 취소하는 행위는 당사자의 명예와 권리에 큰 불이익을 미치므로, 대통령이 행하는 권력 행사이더라도 사법심사를 자제해야 할 통치행위로 볼 수 없어 법원의 사법심사 대상이 됨(대법원 2015. 4. 23. 2012두26920)"}]}, "81": {"전체": [{"type": "보충", "text": "대통령의 국회 출석·발언은 국정 방향과 정책에 대해 협조를 구하기 위한 대통령의 '권한'일 뿐 법적 '의무'가 아니므로, 국회가 대통령의 출석이나 발언을 강제로 요구할 수는 없음"}]}, "82": {"전체": [{"type": "보충", "text": "대통령의 모든 국법상 행위는 문서로 하여야 하며, 군사에 관한 행위까지도 반드시 국무총리와 관계 국무위원이 부서하도록 강제하여, 대통령에 대한 보좌 책임을 명확히 하고 권한 남용을 절차적으로 통제하는 헌법적 장치임"}]}, "83": {"전체": [{"type": "보충", "text": "대통령은 권력의 지나친 집중을 막고 직무의 공정성을 확보하기 위해, 국무총리·국무위원·행정각부의 장 등 일체의 법률이 정하는 공공 및 사적 직위를 겸임할 수 없도록 헌법상 엄격한 의무를 짐"}]}, "84": {"전체": [{"type": "판례", "text": "대통령의 재직 중 형사상 불소추특권으로 인해 재직 기간 중 공소시효 진행이 당연히 정지되며, 이는 면죄부가 아니라 퇴임 후 반드시 처벌받도록 하여 헌법 정신에 부합하도록 해석해야 함(헌재 1995. 1. 20. 94헌마246)"}]}, "85": {"전체": [{"type": "보충", "text": "헌법 제85조의 위임에 따라 제정된 「전직대통령 예우에 관한 법률」로 전직 대통령에 대한 연금 지급·비서관 지원·경호 등 물질적·의전적 예우 조치를 법적으로 뒷받침하고 있음"}]}, "86": {"전체": [{"type": "판례", "text": "국무총리가 행정각부를 통할한다는 것이 모든 행정기관이 반드시 국무총리 지휘를 받는 행정각부 소속이어야 한다는 뜻은 아니므로, 국가안전기획부를 대통령 직속기관으로 설치한 것은 합헌임(헌재 1994. 4. 28. 89헌마86)"}]}, "87": {"전체": [{"type": "보충", "text": "헌법은 군의 정치 개입을 차단하기 위해 현역 군인은 국무위원으로 임명될 수 없다는 문민우위 원칙을 명시하고 있으며, 대통령제에 의원내각제 요소를 가미하여 국회의원이 장관직을 겸직하는 것은 법적으로 허용됨"}]}, "88": {"전체": [{"type": "판례", "text": "대통령의 해외 순방은 직무를 수행할 수 없는 일시적 사고에 해당하므로, 부의장인 국무총리가 주재하여 정당해산심판 청구를 의결한 국무회의는 헌법상 완전히 적법함(헌재 2014. 12. 19. 2013헌다1)"}]}, "89": {"전체": [{"type": "판례", "text": "어떤 정책을 필수적으로 국무회의 심의를 거쳐야 하는 '중요한 정책'으로 볼 것인지는 대통령에게 상당한 판단 재량이 있으므로, 개성공단 전면 중단 결정 시 NSC 협의를 거친 것이 헌법 절차를 위반한 자의적 조치는 아닌 합헌임(헌재 2022. 1. 27. 2016헌마364)"}]}, "90": {"전체": [{"type": "보충", "text": "국가원로자문회의는 헌법상 \"둘 수 있다\"고 명시된 임의기관으로, 반드시 설치해야 할 헌법적 강제 의무가 없으며 국정의 중요한 사항에 대해 국가원로의 지혜를 구하기 위해 마련된 제도적 장치임"}]}, "91": {"전체": [{"type": "보충", "text": "국가안전보장회의(NSC)는 다른 자문기관과 달리 헌법상 반드시 \"둔다\"고 명시된 유일한 필수적 자문기관으로, 국가 존립과 직결된 안보 사안을 다루는 중요한 헌법적 위상을 가짐"}]}, "92": {"전체": [{"type": "보충", "text": "민주평화통일자문회의는 \"둘 수 있다\"고 규정된 임의기관으로, 헌법 제4조의 평화적 통일 지향이라는 국가적 과제를 대통령이 효과적으로 추진하기 위해 폭넓은 국민적 자문을 구할 수 있도록 설계된 조항임"}]}, "93": {"전체": [{"type": "보충", "text": "국민경제자문회의는 헌법상 \"둘 수 있다\"고 명시된 임의기관으로, 국가 재정과 거시 경제 정책 등에 관한 전문적이고 신중한 결정을 돕기 위해 대통령의 재량에 따라 법률로 조직과 직무 범위를 정하여 운영할 수 있음"}]}, "94": {"전체": [{"type": "보충", "text": "모든 장관은 반드시 국무위원 신분을 가져야 하나, 반대로 특정 행정부처를 맡지 않는 무임소 장관(특임장관)처럼 행정각부의 장이 아닌 국무위원도 헌법상 존재할 수 있음"}]}, "95": {"전체": [{"type": "판례", "text": "식품 위생 사항을 총리령으로 정하도록 기본 기준도 없이 포괄적으로 위임한 구 식품위생법 조항은, 국민이 어떤 내용이 정해질지 예측할 수 없어 포괄위임입법금지 원칙에 정면으로 위배되는 위헌임(헌재 2014. 6. 26. 2014헌가6)"}]}, "96": {"전체": [{"type": "판례", "text": "행정기관의 구체적 설치와 조직은 국회가 법률로 자유롭게 형성할 재량이 있으므로, 수사의 독립성과 중립성을 위해 기존 행정각부 소속이 아닌 별도 기구로 공수처를 설치한 것은 권력분립 원칙에 반하지 않는 합헌임(헌재 2021. 1. 28. 2020헌마264)"}]}, "97": {"전체": [{"type": "판례", "text": "감사원이 지방자치단체의 자치사무에 대해 합목적성까지 포괄적으로 감사하는 것은, 중앙정부와 지방자치단체의 협력관계 및 국가재정 의존도 등을 고려할 때 지방자치권의 본질적 내용을 침해하지 않는 합헌임(헌재 2008. 5. 29. 2005헌라3)"}]}, "98": {"전체": [{"type": "보충", "text": "~제100조  감사원은 대통령 소속이나 직무상 독립된 합의제 헌법기관으로, 감사원장과 감사위원의 임기를 4년으로 보장하며 감사원장은 국회 동의를 얻어 대통령이 임명하여 민주적 정당성을 부여함"}]}, "101": {"전체": [{"type": "판례", "text": "학교법인이 교원 징계에 대한 교원소청심사위원회의 재심결정에 불복하여 법원에 행정소송을 제기하는 것을 원천 차단한 법률 조항은, 일체의 법률적 쟁송에 대한 재판 권능을 법원에 부여한 헌법에 위배되고 재판청구권을 박탈하는 위헌임(헌재 2006. 2. 23. 2005헌가7)"}]}, "102": {"전체": [{"type": "판례", "text": "소액사건에 대해 대법원 상고 사유를 판례 위반 등으로 극히 제한한 소액사건심판법 조항은, 심급제도는 입법자의 광범위한 형성 재량에 속하고 법령해석 통일이라는 공익을 우선한 합리적 규정이므로 합헌임(헌재 1992. 6. 26. 90헌바25 등)"}]}, "103": {"전체": [{"type": "판례", "text": "형사수석부장판사가 담당 법관의 재판에 개입하여 특정 판결 취지를 요구한 행위는 법관의 직무상 독립을 정면으로 위반한 중대한 헌법 위반이나, 피청구인이 이미 임기 만료로 퇴직한 상태여서 파면 결정을 내릴 수 없어 각하함(헌재 2021. 10. 28. 2021헌나1)"}]}, "104": {"전체": [{"type": "보충", "text": "대통령의 사법부 인사권 독점으로 인한 사법부 예속을 막기 위해, 대법원장은 국회 동의를 거쳐 대통령이 임명하고 대법관은 대법원장의 제청으로 국회 동의를 얻어 대통령이 임명하도록 분산시켜 견제와 균형 및 민주적 정당성을 부여함"}]}, "105": {"전체": [{"type": "판례", "text": "근무성적 불량을 연임 결격사유로 둔 법원조직법 규정은, 명확성 원칙에 반하지 않고 의견진술권 등 절차적 보장과 행정소송 제기 가능성이 마련되어 있으므로 법관의 신분보장이나 사법의 독립을 침해하지 않는 합헌임(헌재 2015. 10. 21. 2015헌바331)"}]}, "106": {"전체": [{"type": "판례", "text": "법관에 대한 징계처분 취소청구 소송을 대법원 단심재판으로 진행하도록 한 법관징계법 조항은, 법관 지위의 특수성을 고려한 합리적 결단이며 대법원이 사실확정과 법률적용을 모두 관장하므로 사실확정 기회가 박탈된 것이 아닌 합헌임(헌재 2010. 2. 25. 2009헌바34)"}]}, "107": {"전체": [{"type": "판례", "text": "하위 법규인 규칙이 별도의 집행행위를 기다릴 것 없이 직접 국민의 기본권을 침해하는 예외적인 경우에는, 대법원의 명령·규칙심사와 상관없이 곧바로 헌법재판소의 헌법소원심판 대상이 될 수 있음(헌재 1990. 10. 15. 89헌마178)"}]}, "108": {"전체": [{"type": "판례", "text": "소송절차에 관한 사항을 대법원규칙으로 위임할 때에도 헌법 제75조의 포괄위임입법금지 원칙이 동일하게 적용되어, 하위 규정에 정해질 내용의 대강을 누구라도 미리 예측할 수 있어야 한다는 사법입법권의 한계를 명확히 함(헌재 2014. 10. 30. 2013헌바368)"}]}, "109": {"전체": [{"type": "보충", "text": "재판의 심리와 판결은 원칙적으로 공개하되, 국가 안전보장·안녕질서·선량한 풍속을 해칠 염려가 있는 경우 법원 결정으로 심리를 비공개할 수 있으나, 어떤 경우에도 판결의 선고만큼은 반드시 공개하여야 함"}]}, "110": {"전체": [{"type": "판례", "text": "비상계엄 상황이라 할지라도 오랜 기간 영장주의를 완전히 배제하고 수사기관의 강제처분을 전면 허용한 법률조항은, 헌법이 허용하는 특별한 조치의 한계를 명백히 일탈하여 국민의 신체의 자유를 침해하는 위헌임(헌재 2012. 12. 27. 2011헌가5)"}]}, "111": {"전체": [{"type": "판례", "text": "헌법재판소법에 명시적으로 열거되지 않았더라도 국회의원과 국회의장은 헌법에 의해 설치되고 헌법적 권한을 부여받은 독립된 국가기관이므로, 권한쟁의심판의 적법한 당사자가 될 수 있음을 최초로 인정함(헌재 1997. 7. 16. 96헌라2)"}]}, "112": {"전체": [{"type": "판례", "text": "국회가 선출하는 헌법재판관 자리가 공석이 되었음에도 국회가 장기간 후임자를 선출하지 않은 경우, 국회는 상당한 기간 내에 후임자를 선출하여야 할 구체적인 헌법상 작위의무가 존재함(헌재 2014. 4. 24. 2012헌마2)"}]}, "113": {"전체": [{"type": "판례", "text": "국회 선출 몫 재판관 3인이 공석인 상태에서 7인 이상 출석을 강제한 헌법재판소법 조항을 기계적으로 적용하면 국민의 신속한 헌법재판을 받을 권리가 심각하게 침해되므로, 본안 결정 선고 시까지 해당 조항의 효력을 정지시켜 6인으로도 심리를 계속할 수 있도록 가처분을 인용함(헌재 2024. 10. 14. 2024헌사1250)"}]}, "114": {"전체": [{"type": "판례", "text": "대통령이 공정한 선거가 실시되도록 총괄·감독해야 한다는 헌재의 해석은, 선거관리 책임을 선관위에 독점적으로 맡긴 헌법 제114조에 반하며 행정부는 선거사무를 단지 지원할 수 있을 뿐 총괄·감독 권한은 전적으로 선관위에 있음을 간과한 논쟁적 해석이라고 교과서는 지적함(헌재 2004. 5. 14. 2004헌나1)"}]}, "115": {"전체": [{"type": "보충", "text": "각급 선거관리위원회는 선거사무에 관하여 관계 행정기관에 필요한 지시를 할 수 있고, 지시를 받은 행정기관은 반드시 응하여야 하는 헌법상 의무를 지며, 이는 선관위가 일반 행정기관의 인력과 조직을 통제하고 동원할 수 있도록 보장하는 강력한 장치임"}]}, "116": {"전체": [{"type": "판례", "text": "헌법 제116조 제1항이 입법자에게 선거운동에 관한 폭넓은 형성적 권한을 부여하고 있으므로, 선거운동 방법에 대한 규제의 평등권 침해 여부는 엄격한 심사가 아닌 합리적 이유가 있는지를 따지는 완화된 합리성 심사만으로 족하다고 판시하여 입법자의 광범위한 재량을 인정함(헌재 2010. 5. 27. 2008헌마491)"}]}, "117": {"전체": [{"type": "판례", "text": "감사원이 지방자치단체의 자치사무에 대해 합목적성까지 포괄적으로 감사하는 것은, 중앙정부와 지방자치단체의 협력관계 및 국가재정 의존도 등을 고려할 때 지방자치권의 본질적 내용을 침해하지 않는 합헌임(헌재 2008. 5. 29. 2005헌라3)"}]}, "118": {"전체": [{"type": "판례", "text": "헌법이 지방의회의원에 대해서는 '의원선거'라고 명시하면서 지방자치단체장에 대해서는 '선임방법'을 법률로 정한다고 다르게 규정하므로, 지방자치단체장 선거권은 헌법이 직접 보장하는 기본권이 아니라 법률 제정에 의해 비로소 인정되는 법률상의 권리임(헌재 2002. 3. 28. 2000헌마283)"}]}, "119": {"전체": [{"type": "판례", "text": "대형마트의 심야·아침 영업 제한 및 의무휴업일 지정은, 헌법 제119조 제2항의 시장 지배·경제력 남용 방지 및 경제민주화라는 국가 목표를 달성하기 위해 중소유통업체를 보호하려는 합당한 규제로 합헌임(헌재 2018. 6. 28. 2016헌바77)"}]}, "120": {"전체": [{"type": "보충", "text": "광물·수력 등 천연자원은 원칙적으로 국가 소유로 하고 특허제도를 통해서만 개발을 허용하며, 이는 한정된 국토와 자원을 무분별하게 시장에 맡길 경우 미래세대를 위한 합리적 관리가 불가능하므로 국가가 장기적으로 효율적·균형 있게 보호해야 할 헌법적 의무를 부과한 것임"}]}, "121": {"전체": [{"type": "판례", "text": "비자경농에게 농지를 강제 처분하게 하고 이행강제금을 부과하는 농지법 조항은, 전근대적 토지소유관계 청산과 농지 투기 방지를 위해 헌법 제121조의 경자유전 원칙에 뿌리를 둔 정당한 조치이므로 재산권 침해가 아닌 합헌임(헌재 2010. 2. 25. 2008헌바80)"}]}, "122": {"전체": [{"type": "판례", "text": "그린벨트 지정으로 인한 개발 제한 자체는 토지의 강한 공공성을 근거로 원칙적으로 합헌이나, 종래의 목적으로도 전혀 사용할 수 없어 재산권이 실질적으로 텅 빈 껍데기가 되는 예외적 상황에 아무런 보상도 두지 않은 것은 비례원칙에 위반되는 헌법불합치임(헌재 1998. 12. 24. 89헌마214)"}]}, "123": {"전체": [{"type": "판례", "text": "소주 판매업자에게 자기 지역 소주를 50% 이상 의무 구입하게 강제한 구 주세법 규정은, 법률로 경쟁을 원천 차단하여 특정 업체를 온실 속에 보호하는 방식이 자유시장경제질서의 근간을 훼손하므로 정당화될 수 없는 위헌임(헌재 1996. 12. 26. 96헌가18)"}]}, "124": {"전체": [{"type": "판례", "text": "헌법이 소비자보호운동을 헌법상 권리로 보장하더라도, 기업을 직접 압박하거나 협박·강요하는 등 물리적 위력을 행사하는 것은 헌법이 허용하는 정당한 소비자운동의 한계를 벗어난 것이므로 처벌 조항은 합헌임(헌재 2011. 12. 29. 2010헌바54)"}]}, "125": {"전체": [{"type": "보충", "text": "국가가 국민경제의 안정을 확보하고 산업 불균형을 해소하기 위해 수출입 등 무역 전반에 유연하게 개입할 수 있는 헌법적 기반을 제공하는 조항으로, 무역 육성 의무와 규제·조정 권한을 함께 명시함"}]}, "126": {"전체": [{"type": "판례", "text": "대통령이 비공식 지시로 은행을 동원하여 국제그룹을 강제 해체하고 경영권을 다른 기업에 넘긴 행위는, 법률이 정한 경우가 아님에도 사영기업의 경영을 통제한 헌법 제126조 위반의 명백한 위헌적 공권력 행사임(헌재 1993. 7. 29. 89헌마31)"}]}, "127": {"전체": [{"type": "보충", "text": "국가가 과학기술에 투자하거나 역량 있는 기업을 지원하는 것은 헌법적 과제를 수행하는 것으로 시장경제원리에 어긋나지 않으며, 국가과학기술자문회의와 국가표준기본법 등을 통해 이를 실현함"}]}, "128": {"전체": [{"type": "보충", "text": "대통령 임기 연장·중임을 위한 헌법개정은 개정 제안 당시의 현직 대통령에게는 효력이 미치지 않으며, 이는 권력자의 장기집권을 위한 헌법 개정을 반복하지 않기 위해 헌법 자체에 못 박아둔 헌법개정의 내재적 한계 규정임"}]}, "129": {"전체": [{"type": "보충", "text": "제안된 헌법개정안을 대통령이 반드시 20일 이상 국민에게 공고하도록 강제하는 것은, 주권자인 국민이 개정 내용을 충분히 숙지하고 공론화 과정을 거칠 수 있도록 기습적 통과를 막기 위한 필수적인 민주적 절차 원리임"}]}, "130": {"전체": [{"type": "보충", "text": "헌법개정은 국회 재적의원 3분의 2 이상의 찬성과 국민투표라는 이중의 엄격한 관문을 거쳐야 하며, 이러한 경성헌법 구조야말로 주권자인 국민이 직접 헌법개정권력을 행사하게 함으로써 헌법의 최고규범성을 수호하는 가장 강력한 방어 장치임"}]}, "전문": {"전체": [{"type": "판례", "text": "헌법 전문의 \"임시정부 법통 계승\" 선언은 단순한 역사적 사실이 아니라 국가의 법적 의무를 창설하는 근거로서, 국가는 독립유공자·유족에 대한 예우 의무와 일본군 위안부·원폭 피해자 등의 훼손된 존엄을 회복시켜야 할 헌법적 보호 의무를 짐(헌재 2005. 6. 30. 2004헌마859 등, 헌재 2011. 8. 30. 2006헌마788 등)"}, {"type": "판례", "text": "헌법 전문에 기재된 3·1정신은 헌법과 법률의 해석 기준으로 작용하는 최고 가치규범으로서 법적 효력을 가지나, 그 전문의 내용 자체로부터 국민 개개인의 주관적이고 구체적인 기본권이 독자적으로 도출되는 것은 아님(헌재 2001. 3. 21. 99헌마139)"}, {"type": "판례", "text": "정당 추천 후보자에게만 정당연설회 개최 특혜를 주고 무소속 후보자에게는 이에 준하는 선거운동 기회를 허용하지 않은 것은, 헌법 전문의 기회균등 취지에 정면으로 위반되는 위헌임(헌재 1992. 3. 13. 92헌마37)"}]}};
